<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; background: #e0f2f1; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid #1877F2; border-radius: 1rem; padding: 10px; }
        .btn-base { color: white; padding: 8px 12px; border-radius: 8px; font-weight: 900; font-size: 8px; text-transform: uppercase; }
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto space-y-2">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div class="flex gap-1">
                <button onclick="window.location.reload()" class="bg-red-500 text-white w-8 h-8 rounded"><i class="fas fa-sync"></i></button>
                <button onclick="toggleGPS()" id="btn-gps" class="bg-green-600 text-white w-8 h-8 rounded font-bold">G</button>
            </div>
            <div class="flex gap-1">
                <button onclick="toggleSection('groupe-section')" class="bg-green-900 btn-base">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="bg-blue-600 btn-base">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="bg-purple-600 btn-base">CONCOURS</button>
            </div>
        </div>

        <!-- Notification -->
        <div class="glass-card border-blue-500 overflow-hidden">
            <marquee class="font-black uppercase text-sm text-blue-900">Bienvenue sur Les Silures de Canapé !</marquee>
        </div>

        <!-- Sections -->
        <div id="concours-section" class="hidden glass-card border-purple-600">
            <h3 class="text-[10px] font-bold text-purple-700">PAGE CONCOURS</h3>
        </div>
        <div id="groupe-section" class="hidden glass-card border-green-800">
            <h3 class="text-[10px] font-bold">GESTION DES SCORES</h3>
        </div>
        <div id="spots-section" class="hidden glass-card border-blue-600">
            <h3 class="text-[10px] font-bold">LISTE DES SPOTS</h3>
        </div>

        <!-- Sélecteurs -->
        <select id="fish-select" onchange="calculateIndex()" class="w-full p-2 rounded-lg border border-blue-500 text-xs font-bold text-center">
            <option value="Silure">SILURE</option>
            <option value="Brochet">BROCHET</option>
        </select>

        <!-- Affichage Probabilités -->
        <div class="glass-card border-2 border-blue-500 space-y-2">
            <div class="flex justify-between items-center text-xs font-bold">
                <span>LAC: <span id="lac-prob">100%</span></span>
                <span>RIVIÈRE: <span id="riv-prob">100%</span></span>
            </div>
            <div class="text-center text-2xl font-black text-blue-900" id="total-val">--%</div>
        </div>

        <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl shadow-lg">
    </div>

    <script>
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function toggleGPS() { 
            const btn = document.getElementById('btn-gps');
            btn.classList.toggle('bg-green-600');
            btn.classList.toggle('bg-red-600');
        }
        function calculateIndex() {
            document.getElementById('lac-prob').innerText = "100%";
            document.getElementById('riv-prob').innerText = "100%";
            document.getElementById('total-val').innerText = "100%";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Silures</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">

    <div id="app" class="max-w-sm mx-auto p-6 bg-slate-800 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Connexion</h1>
        <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-2 mb-4 text-black rounded">
        <button id="btn-login" class="w-full py-2 bg-blue-600 rounded font-bold">Connexion</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. CONFIGURATION (Copiez vos lignes ici)
        const firebaseConfig = {
            apiKey: "VOTRE_CLE_ICI",
            authDomain: "les-silures-de-canape-c90e6.firebaseapp.com",
            projectId: "les-silures-de-canape-c90e6",
            storageBucket: "les-silures-de-canape-c90e6.firebasestorage.app",
            messagingSenderId: "1063082508513",
            appId: "1:1063082508513:web:1068368a1db2dff18377a0"
        };

        // 2. INITIALISATION
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. LOGIQUE
        document.getElementById("btn-login").addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => alert("Connecté !"))
                .catch(err => alert("Erreur : " + err.message));
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Officiel TV - ETS2 Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Ubuntu', sans-serif;
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            overflow: hidden;
            position: relative;
            color: #eceff1;
        }

        /* --- BANDEAU INFÉRIEUR ULTRA ÉPURÉ --- */
        .bottom-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1920px;
            height: 45px;
            background: linear-gradient(90deg, rgba(20, 27, 38, 0.9) 0%, rgba(38, 50, 68, 0.8) 50%, rgba(20, 27, 38, 0.9) 100%);
            border-top: 2px solid #00d2ff; /* Ligne fine Bleu Océan */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
        }

        /* --- BLOC NOM DE CHAÎNE (STYLE SHARK) --- */
        .channel-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Petit aileron stylisé en CSS */
        .shark-fin {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid #00d2ff;
            transform: rotate(-25px);
            display: inline-block;
        }

        .channel-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
        }

        /* --- BLOC RÉSEAUX / INFOS --- */
        .socials-container {
            display: flex;
            gap: 40px;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 400;
            color: #b0bec5; /* Gris requin clair */
        }

        .social-item strong {
            color: #00d2ff;
            font-weight: 700;
        }

        /* --- PETIT EFFET SIMU DE ROUTE --- */
        .simulation-tag {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(0, 210, 255, 0.15);
            color: #00d2ff;
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Barre unique tout en bas de l'écran, façon tableau de bord discret -->
    <div class="bottom-ticker">
        
        <!-- Gauche : Identité de ta chaîne -->
        <div class="channel-brand">
            <span class="shark-fin"></span>
            <span class="channel-name">Shark Officiel TV</span>
        </div>

        <!-- Droite : Tes réseaux (à modifier selon tes besoins) -->
        <div class="socials-container">
            <div class="social-item">
                <span>YouTube :</span> <strong>Shark Officiel TV</strong>
            </div>
            <div class="social-item">
                <span>TikTok :</span> <strong>@SharkOfficiel</strong>
            </div>
            <div class="simulation-tag">
                ETS2 Live
            </div>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .underwater-bg {
            background-image: linear-gradient(rgba(12, 26, 38, 0.7), rgba(12, 26, 38, 0.9)), 
                              url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(25, 59, 87, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(74, 199, 242, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .input-marine {
            background: rgba(10, 25, 41, 0.7);
            border: 1px solid rgba(74, 199, 242, 0.2);
            color: white;
        }
    </style>
</head>
<body class="underwater-bg min-h-screen text-white">

    <header class="glass-card w-full fixed top-0 z-50 rounded-b-xl">
        <div class="max-w-md mx-auto flex items-center justify-between px-5 py-3">
            <h1 class="text-xl font-bold">Les Silures de Canapé</h1>
            <i class="fab fa-facebook text-2xl text-[#4ac7f2]"></i>
        </div>
    </header>

    <div id="login-page" class="flex flex-col items-center justify-center pt-32 px-6">
        <div class="w-full max-w-md p-8 glass-card rounded-2xl">
            <p class="text-xs uppercase text-blue-300 text-center">Espace Membres</p>
            <input id="email" type="email" class="input-marine w-full p-3 mt-4 rounded" placeholder="Identifiant">
            <input id="password" type="password" class="input-marine w-full p-3 mt-4 rounded" placeholder="Mot de passe">
            <button id="btn-login" class="w-full py-3 mt-6 bg-blue-500 rounded font-bold">Se connecter</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden pt-24 px-4 space-y-4">
        <section id="tab-carnet" class="glass-card p-5 rounded-2xl">
            <h3 class="font-bold mb-2">Mon Carnet</h3>
            <button onclick="alert('Fonctionne !')" class="w-full py-2 bg-blue-500 rounded">Enregistrer</button>
        </section>
    </div>

    <script>
        document.getElementById("btn-login").onclick = () => {
            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("dashboard-page").classList.remove("hidden");
        };
    </script>
</body>

</html>

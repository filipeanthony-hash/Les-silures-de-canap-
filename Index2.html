<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .underwater-bg {
            background-image: linear-gradient(rgba(12, 26, 38, 0.7), rgba(12, 26, 38, 0.9)), 
                              url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(25, 59, 87, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(74, 199, 242, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .input-marine {
            background: rgba(10, 25, 41, 0.7);
            border: 1px solid rgba(74, 199, 242, 0.2);
            color: white;
        }
    </style>
</head>
<body class="underwater-bg flex flex-col min-h-full antialiased text-white">

    <header class="glass-card text-white shadow-lg w-full fixed top-0 z-50 rounded-b-xl border-t-0 border-x-0">
        <div class="max-w-md mx-auto flex items-center justify-between px-5 py-3">
            <h1 class="text-xl font-bold">Les Silures de Canapé</h1>
            <i class="fab fa-facebook text-2xl text-[#4ac7f2]"></i>
        </div>
    </header>

    <div class="flex flex-col items-center justify-center flex-1 px-6 pt-32 w-full max-w-md mx-auto">
        <div class="w-full p-8 space-y-6 glass-card rounded-2xl">
            <div class="text-center">
                <p class="text-xs uppercase text-blue-300 font-semibold">Espace Membres</p>
                <p class="text-sm text-slate-200">Connectez-vous pour activer le Dashboard</p>
            </div>

            <input id="email" type="email" class="input-marine w-full p-3 rounded" placeholder="Identifiant (e-mail)">
            <input id="password" type="password" class="input-marine w-full p-3 rounded" placeholder="Mot de passe">
            
            <button id="btn-login" class="w-full py-3 bg-blue-500 rounded font-bold hover:bg-blue-600">Se connecter</button>
            <button id="btn-register" class="w-full py-3 bg-blue-700 rounded font-bold hover:bg-blue-800">S'inscrire</button>
        </div>
    </div>

    <script>
        // Test simple sans Firebase
        document.getElementById("btn-login").onclick = () => {
            alert("Bouton Connexion cliqué ! Le design fonctionne.");
        };

        document.getElementById("btn-register").onclick = () => {
            alert("Bouton Inscrire cliqué ! Le design fonctionne.");
        };
    </script>
</body>
</html>

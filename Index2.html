<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid #1877F2; border-radius: 1rem; }
        .btn-gps-on { background-color: #16a34a !important; color: white !important; }
        .btn-gps-off { background-color: #dc2626 !important; color: white !important; }
    </style>
</head>
<body class="river-bg p-2">

    <div class="max-w-md mx-auto space-y-2">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div class="flex gap-1 items-center">
                <button onclick="window.location.reload()" class="bg-red-500 text-white w-8 h-8 rounded"><i class="fas fa-sync"></i></button>
                <button onclick="toggleGPS()" id="btn-gps" class="btn-gps-off w-8 h-8 rounded font-bold">G</button>
                <span id="gps-coords" class="text-[9px] font-bold uppercase italic">LAT/LONG: --</span>
            </div>
            <div class="flex gap-1">
                <a href="https://chat.whatsapp.com/..." class="text-green-600 text-2xl"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/share/..." class="text-blue-700 text-2xl"><i class="fab fa-facebook"></i></a>
                <button onclick="toggleSection('groupe-section')" class="bg-green-900 text-white px-2 py-1 rounded text-[8px] font-bold">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-bold">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="bg-purple-600 text-white px-2 py-1 rounded text-[8px] font-bold">CONCOURS</button>
            </div>
        </div>

        <!-- Section GROUPES (5 options) -->
        <div id="groupe-section" class="hidden glass-card p-4 border-2 border-green-900">
            <select id="groupe-select" class="w-full p-2 mb-2 rounded border text-xs">
                <option value="1">Groupe 1</option><option value="2">Groupe 2</option><option value="3">Groupe 3</option><option value="4">Groupe 4</option><option value="5">Groupe 5</option>
            </select>
            <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 mb-2 rounded border">
            <button onclick="checkPass()" class="w-full bg-green-900 text-white p-2 rounded">ENTRER</button>
            <div id="score-area" class="hidden text-center mt-2">
                <div class="text-xl font-bold">Poissons totaux : <span id="count-val">0</span></div>
                <div class="text-3xl font-black" id="total-score">0 pts</div>
                <button onclick="addFish()" class="bg-orange-500 text-white w-full p-2 mt-2 rounded font-bold">+ 1 POISSON</button>
            </div>
        </div>

        <!-- Section SPOTS (15 adresses) -->
        <div id="spots-section" class="hidden glass-card p-4 border-2 border-blue-600 h-48 overflow-y-auto">
            <h3 class="font-bold mb-2">LISTE DES 15 SPOTS</h3>
            <div id="spots-list" class="space-y-1 text-xs">
                <!-- Insère ici tes 15 adresses avec liens Maps -->
                <p>📍 Spot 1 : [COLLE TON ADRESSE ICI]</p>
            </div>
        </div>

        <!-- Section CONCOURS -->
        <div id="concours-section" class="hidden glass-card p-4 border-2 border-purple-600">
            <h3 class="font-bold text-purple-700">PAGE CONCOURS</h3>
        </div>

        <marquee class="glass-card p-2 font-black text-blue-900 uppercase text-sm">Bienvenue chez les Silures de Canapé !</marquee>

        <!-- Sélecteur Poisson + Résultat + Image -->
        <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl border border-blue-500 text-xs font-black uppercase text-center">
            <!-- (Liste des 23 poissons) -->
        </select>

        <div class="glass-card p-4 border-2 border-blue-500 flex items-center justify-between">
            <img id="fish-img" src="https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png" class="w-20 h-20 rounded-xl object-cover">
            <div class="text-right">
                <div class="text-3xl font-black text-blue-900" id="total-val">68%</div>
                <div class="text-[10px] font-bold">LAC: <span id="lac-p">63%</span> | RIVIÈRE: <span id="riv-p">73%</span></div>
            </div>
        </div>

        <!-- Image pied de page -->
        <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl shadow-xl">
    </div>

    <script>
        // API CONFIG
        const MY_API_KEY = "[INSÉRER TA CLÉ ICI]";
        let isGpsOn = false;

        function toggleGPS() {
            isGpsOn = !isGpsOn;
            const btn = document.getElementById('btn-gps');
            btn.className = isGpsOn ? "btn-gps-on w-8 h-8 rounded font-bold" : "btn-gps-off w-8 h-8 rounded font-bold";
            if(isGpsOn) document.getElementById('gps-coords').innerText = "LAT: 49.07, LONG: 3.33";
            else document.getElementById('gps-coords').innerText = "LAT/LONG: --";
        }
        
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function checkPass() { if(document.getElementById('pass').value === "1234") document.getElementById('score-area').classList.remove('hidden'); }
        function addFish() { /* Ajoute logique score */ }
        function calculateIndex() { /* Ajoute logique probabilité */ }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay Perso</title>
    <style>
        /* Import d'une police moderne et lisible */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            width: 1920px;
            height: 1080px;
            background-color: transparent; /* Fond transparent pour Streamlabs */
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        /* --- STYLE DE LA BANDE EN HAUT (RÉSEAUX / INFOS) --- */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid #00adb5; /* Bordure couleur Cyan/Néon */
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.4);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Petit point lumineux animé */
        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff2e63;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff2e63;
            animation: pulse 1.5s infinite;
        }

        /* --- STYLE DU CADRE WEBCAM (Ajustable) --- */
        .webcam-box {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 400px;
            height: 225px; /* Ratio 16:9 */
            border: 3px solid #00adb5;
            box-shadow: 0 0 20px rgba(0, 173, 181, 0.5);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.1);
        }

        .webcam-label {
            position: absolute;
            top: -15px;
            left: 15px;
            background: #00adb5;
            padding: 2px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px #ff2e63; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- Barre d'infos supérieure -->
    <div class="top-bar">
        <div class="info-item">
            <div class="live-dot"></div>
            <span style="color: #ff2e63;">Live</span>
        </div>
        <div class="info-item">
            <span style="color: #00adb5;">Pseudo :</span> MonStream
        </div>
        <div class="info-item">
            <span style="color: #00adb5;">YouTube :</span> @MonLien
        </div>
    </div>

    <!-- Cadre pour la Webcam / Incrustation -->
    <div class="webcam-box">
        <div class="webcam-label">Joueur</div>
    </div>

</body>
</html>

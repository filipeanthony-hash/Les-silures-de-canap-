<!DOCTYPE html>
<html lang="fr" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; overflow: hidden; touch-action: none; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
    </style>
</head>
<body class="river-bg h-screen font-sans p-2 overflow-hidden" onload="initApp()">

    <div id="dashboard" class="w-full max-w-md mx-auto h-full flex flex-col space-y-2 overflow-y-auto pb-10">
        <div class="flex justify-between items-center px-2 pt-2">
            <h2 class="text-[10px] font-bold uppercase" id="city-name">Localisation...</h2>
            <div class="flex gap-2 items-center">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="text-green-600 text-3xl"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="text-fb text-3xl"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-3 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">SPOTS</button>
            </div>
        </div>

        <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
            <h3 class="text-[10px] font-bold uppercase mb-2">Gestion des Scores</h3>
            <div id="login-part" class="space-y-2">
                <select id="groupe-select" class="w-full p-2 rounded text-xs"><option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option><option value="groupe3">Groupe 3</option><option value="groupe4">Groupe 4</option><option value="groupe5">Groupe 5</option></select>
                <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 rounded text-xs border">
                <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 rounded text-xs font-black">ENTRER</button>
            </div>
            <div id="counter-part" class="hidden text-center space-y-2">
                <h4 id="group-title" class="font-bold text-xs uppercase"></h4>
                <div class="text-4xl font-black" id="total-score">0 pts</div>
                <button onclick="addFish()" class="w-full bg-orange-500 text-white p-2 rounded-lg font-black text-xs">+ 1 POISSON (5 pts)</button>
                <input type="number" id="poids-input" placeholder="Grammes" class="w-full p-2 rounded text-xs border">
                <button onclick="addWeight()" class="w-full bg-blue-600 text-white p-2 rounded-lg font-black text-xs">+ AJOUTER POIDS</button>
                <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded text-[9px]">RESET</button>
            </div>
        </div>

        <div class="glass-card-river p-3 border-fb flex items-center gap-3">
            <i class="fas fa-bell text-fb text-xl"></i>
            <marquee behavior="scroll" direction="left" class="text-[14px] font-black uppercase">Bienvenue sur Les Silures de Canapé !</marquee>
        </div>

        <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb">
            <h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3>
            <div id="spots-list" class="space-y-2"></div>
        </div>

        <div class="glass-card-river p-4 text-center border-2 border-fb">
            <div id="final-index" class="text-4xl font-black">--%</div>
            <p id="weather-status" class="text-[9px] mt-1 italic font-bold">Initialisation...</p>
        </div>

        <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-white/50 border border-fb text-xs font-black">
            <option value="Silure">Silure</option><option value="Brochet">Brochet</option><option value="Black Bass">Black Bass</option>
            <option value="Sandre">Sandre</option><option value="Truite">Truite</option><option value="Carpe">Carpe</option>
            <option value="Perche commune">Perche commune</option>
        </select>

        <div class="glass-card-river overflow-hidden border-fb">
            <table class="w-full text-xs text-center">
                <thead><tr class="bg-blue-100"><th class="p-2">LIEU</th><th class="p-2">PROBABILITÉ</th></tr></thead>
                <tbody id="prob-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_KEY = "4b4496c76203ee1d238e2ea8c121830f"; 
        let weatherData = { temp: 15, clouds: 50 };
        const mySpots = [{ name: "36 Rue René Leblond, 77220 Tournan-en-Brie", url: "https://maps.google.com" }];
        const passwords = { "groupe1":"pass123", "groupe2":"silureA", "groupe3":"brochet77", "groupe4":"canap2026", "groupe5":"pecheur99" };
        const fishStats = {
            "Silure": { base: 65, pref: "p", ideal: 20 }, "Brochet": { base: 50, pref: "s", ideal: 12 },
            "Sandre": { base: 55, pref: "p", ideal: 14 }, "Truite": { base: 70, pref: "s", ideal: 10 },
            "Carpe": { base: 45, pref: "s", ideal: 21 }, "Black Bass": { base: 45, pref: "s", ideal: 22 }
        };

        // Fonctions Groupes & Spots
        function toggleSection(id) { 
            const section = document.getElementById(id); section.classList.toggle('hidden');
            if(id === 'spots-section' && !section.classList.contains('hidden')) {
                document.getElementById('spots-list').innerHTML = mySpots.map(s => `<div onclick="window.open('${s.url}', '_blank')" class="bg-blue-50 p-3 rounded text-sm font-bold cursor-pointer hover:bg-blue-100">${s.name}</div>`).join('');
            }
        }

        function checkPass() {
            const g = document.getElementById('groupe-select').value;
            if(document.getElementById('pass').value === passwords[g]) {
                currentGroup = g;
                document.getElementById('login-part').classList.add('hidden');
                document.getElementById('counter-part').classList.remove('hidden');
                document.getElementById('group-title').innerText = g.toUpperCase();
                document.getElementById('total-score').innerText = (parseInt(localStorage.getItem(g) || 0)) + " pts";
            } else { alert("Code incorrect"); }
        }

        function updateDisplay(s) { localStorage.setItem(currentGroup, s); document.getElementById('total-score').innerText = s + " pts"; }
        function addFish() { updateDisplay(parseInt(localStorage.getItem(currentGroup) || 0) + 5); }
        function addWeight() { const p = parseInt(document.getElementById('poids-input').value); if(!isNaN(p)) { updateDisplay(parseInt(localStorage.getItem(currentGroup) || 0) + p); document.getElementById('poids-input').value = ""; } }
        function resetScore() { if(confirm("Remise à zéro ?")) updateDisplay(0); }

        // Calcul météo automatique
        async function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude, lon = pos.coords.longitude;
                    const resCity = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const dCity = await resCity.json();
                    document.getElementById('city-name').innerText = "📍 " + (dCity.address.town || dCity.address.city || "Localisation");

                    const resWeather = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
                    const dWeather = await resWeather.json();
                    if(dWeather.main) {
                        weatherData.temp = dWeather.main.temp;
                        weatherData.clouds = dWeather.clouds.all;
                        calculateIndex();
                    }
                });
            }
        }

        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            const stats = fishStats[fish] || { base: 50, pref: "s", ideal: 15 };
            const isSunny = weatherData.clouds < 50;
            let bonusMeteo = (stats.pref === "s" && isSunny) ? 12 : (stats.pref === "p" && !isSunny) ? 12 : 0;
            let bonusTemp = 8 - Math.abs(weatherData.temp - stats.ideal);
            let prob = Math.floor(stats.base + bonusMeteo + bonusTemp);
            prob = Math.min(99, Math.max(10, prob));

            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('weather-status').innerText = (isSunny ? "☀️ " : "🌧️ ") + weatherData.temp.toFixed(1) + "°C";
            document.getElementById('prob-table').innerHTML = `<tr><td class="p-2 font-bold text-blue-900">RIVIÈRE</td><td class="p-2 font-bold">${Math.min(99, prob + 15)}%</td></tr><tr><td class="p-2 font-bold text-blue-900">LAC</td><td class="p-2 font-bold">${prob}%</td></tr>`;
        }
    </script>
</body>
</html>

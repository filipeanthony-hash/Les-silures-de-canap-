<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
        .btn-refresh { background-color: #ef4444 !important; color: white !important; }
        .btn-gps-on { background-color: #16a34a !important; color: white !important; font-weight: 900; }
        .btn-gps-off { background-color: #dc2626 !important; color: white !important; font-weight: 900; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
        .btn-social { padding: 10px; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="river-bg font-sans p-2" onload="initApp()">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center px-1 pt-2 pb-1 flex-shrink-0">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-refresh w-7 h-7 rounded flex items-center justify-center text-[10px]"><i class="fas fa-sync"></i></button>
                <button onclick="toggleGPS()" id="btn-gps-main" class="btn-gps-on w-7 h-7 rounded flex items-center justify-center text-[12px]">G</button>
                <h2 class="text-[8px] font-bold uppercase truncate max-w-[50px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-0.5 items-center">
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-concours px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">CONCOURS</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="cards-scroll-area flex flex-col space-y-2 p-1">
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600">
                <h3 class="text-[10px] font-bold uppercase mb-2 text-purple-700">Page Concours</h3>
                <textarea class="w-full h-32 p-2 rounded-lg text-xs border border-purple-200" placeholder="Écris ton texte concours ici..."></textarea>
            </div>

            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <h3 class="text-[10px] font-bold uppercase mb-2">Gestion des Scores</h3>
                <!-- (Logique Groupe inchangée) -->
            </div>

            <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb">
                <h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3>
                <a href="https://www.google.com/maps/search/?api=1&query=36+Rue+René+Leblond+77220+Tournan-en-Brie" target="_blank" class="block w-full p-2 bg-blue-50 border border-fb rounded-lg text-[10px] font-bold text-blue-900 underline mb-2">📍 Spot Tournan</a>
            </div>

            <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-white/50 border border-fb text-xs font-black uppercase text-center">
                <option value="Silure">SILURE</option><option value="Brochet">BROCHET</option><option value="Black Bass">BLACK BASS</option><option value="Sandre">SANDRE</option><option value="Goujon">GOUJON</option><option value="Perche commune">PERCHE COMMUNE</option><option value="Brème">BRÈME</option><option value="Ablette">ABLETTE</option><option value="Vairon">VAIRON</option><option value="Gardon">GARDON</option><option value="Chevesne">CHEVESNE</option><option value="Tanche">TANCHE</option><option value="Carpe">CARPE</option><option value="Rotengle">ROTENGLE</option><option value="Anguille">ANGUILLE</option><option value="Ide mélanote">IDE MÉLANOTE</option><option value="Carassin">CARASSIN</option><option value="Barbeau">BARBEAU</option><option value="Truite">TRUITE</option><option value="Truite arc-en-ciel">TRUITE ARC-EN-CIEL</option><option value="Poisson-chat">POISSON-CHAT</option><option value="Perche-soleil">PERCHE-SOLEIL</option><option value="Bouvière">BOUVIÈRE</option>
            </select>

            <div class="glass-card-river p-3 flex items-center justify-between border-2 border-fb">
                <img id="fish-img" src="https://via.placeholder.com/160" alt="Poisson" class="w-24 h-24 rounded-xl object-cover">
                <div class="text-right pl-4">
                    <div id="final-index" class="text-2xl font-black">--%</div>
                </div>
            </div>

            <!-- Footer Logo -->
            <div class="pt-2 flex justify-center pb-2 flex-shrink-0 w-full">
                <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Logo Silures de Canapé" class="w-full rounded-2xl border-none shadow-xl object-cover">
            </div>
        </div>
    </div>

    <script>
        const fishImages = { "Silure": "https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet": "https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass": "https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre": "https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon": "https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune": "https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème": "https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette": "https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon": "https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon": "https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne": "https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche": "https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe": "https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle": "https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille": "https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote": "https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin": "https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau": "https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite": "https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel": "https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat": "https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil": "https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière": "https://i.postimg.cc/h4ZJ81bD/bouviere.png" };
        
        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishImages[fish];
        }
        function toggleGPS() {
            gpsActive = !gpsActive;
            const btn = document.getElementById('btn-gps-main');
            btn.className = gpsActive ? "btn-gps-on w-7 h-7 rounded flex items-center justify-center text-[12px]" : "btn-gps-off w-7 h-7 rounded flex items-center justify-center text-[12px]";
        }
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
    </script>
</body>
</html>

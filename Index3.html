<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps { background-color: #57534e !important; }
        .bg-gps-active { background-color: #22c55e !important; }
    </style>
</head>
<body class="river-bg font-sans p-2" onload="initApp()">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-1 pt-2 pb-1 flex-shrink-0">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-gps bg-gps-active"><i class="fas fa-location-arrow"></i></button>
                <h2 class="text-[8px] font-bold uppercase truncate max-w-[50px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-1 items-center">
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[7px] font-black uppercase">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-2 rounded-lg text-[7px] font-black uppercase">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-concours px-2 py-2 rounded-lg text-[7px] font-black uppercase">CONCOURS</button>
            </div>
        </div>

        <div class="cards-scroll-area flex flex-col space-y-2 p-1">
            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <div id="login-part">
                    <select id="groupe-select" class="w-full p-2 text-xs mb-2">
                        <option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option><option value="groupe3">Groupe 3</option>
                    </select>
                    <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 mb-2 text-xs border">
                    <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 text-xs font-black">ENTRER</button>
                </div>
                <div id="counter-part" class="hidden text-center">
                    <h4 id="group-title" class="font-bold text-xs uppercase mb-2"></h4>
                    <div class="text-4xl font-black mb-2" id="total-score">0 pts</div>
                    <button onclick="addFishToGroup()" class="w-full bg-orange-500 text-white p-2 rounded mb-2 text-xs font-black">+ 1 POISSON (5 pts)</button>
                    <input type="number" id="poids-input" placeholder="Grammes" class="w-full p-2 mb-2 text-xs border">
                    <button onclick="addWeight()" class="w-full bg-blue-600 text-white p-2 rounded mb-2 text-xs font-black">+ AJOUTER POIDS</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded text-[9px]">RESET GROUPE</button>
                </div>
            </div>

            <!-- Bloc Météo/Probabilité -->
            <div class="glass-card-river p-3 border-2 border-fb flex flex-col gap-3">
                <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 bg-blue-100 border border-fb text-xs font-black uppercase text-center rounded-xl"></select>
                <div class="flex items-center justify-between">
                    <img id="fish-img" src="" class="w-24 h-24 rounded-xl object-cover">
                    <div class="text-right">
                        <div id="final-index" class="text-2xl font-black">--%</div>
                        <p id="weather-status" class="text-[8px] font-bold italic">...</p>
                    </div>
                </div>
            </div>
            <table class="w-full text-xs text-center border-collapse border border-fb" id="prob-table"></table>

            <!-- Compteur Global -->
            <div class="glass-card-river p-4 border-2 border-fb text-center">
                <div class="text-blue-900 font-bold text-xs uppercase mb-2">Total Poissons Pêchés</div>
                <div id="global-fish-counter" class="text-4xl font-black mb-2">0</div>
                <button onclick="addGlobalFish()" class="w-full btn-fb p-3 rounded-lg font-black text-xs">AJOUTER</button>
                <button onclick="resetGlobal()" class="text-red-600 text-[10px] font-bold underline mt-2">RESET TOTAL</button>
            </div>
            
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl shadow-xl">
        </div>
    </div>

    <script>
        const fishStats = { "Silure": { base: 65, ideal: 20 }, "Brochet": { base: 50, ideal: 12 }, "Black Bass": { base: 45, ideal: 22 } };
        const passwords = { "groupe1": "pass123", "groupe2": "silureA", "groupe3": "brochet77" };
        let currentGroup = null;
        let weatherData = { temp: 15 };

        function initApp() {
            const sel = document.getElementById('fish-select');
            Object.keys(fishStats).forEach(f => sel.innerHTML += `<option value="${f}">${f.toUpperCase()}</option>`);
            document.getElementById('global-fish-counter').innerText = localStorage.getItem('globalFish') || 0;
            calculateIndex();
        }

        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            const stats = fishStats[fish];
            // Utilisation de la météo (weatherData.temp) pour le calcul
            let prob = Math.floor(stats.base + (8 - Math.abs(weatherData.temp - stats.ideal)));
            prob = Math.min(99, Math.max(10, prob));
            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('weather-status').innerText = weatherData.temp + "°C";
            document.getElementById('prob-table').innerHTML = `<tr><td class="border border-fb p-1">RIVIÈRE: ${Math.min(99, prob + 15)}%</td><td class="border border-fb p-1">LAC: ${prob}%</td></tr>`;
        }

        function checkPass() {
            const g = document.getElementById('groupe-select').value;
            if(document.getElementById('pass').value === passwords[g]) {
                currentGroup = g;
                document.getElementById('login-part').classList.add('hidden');
                document.getElementById('counter-part').classList.remove('hidden');
                document.getElementById('group-title').innerText = g.toUpperCase();
                updateGroupDisplay();
            } else alert("Code incorrect");
        }

        function updateGroupDisplay() {
            let data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}');
            document.getElementById('total-score').innerText = data.points + " pts";
        }

        function addFishToGroup() {
            let data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}');
            data.points += 5;
            localStorage.setItem(currentGroup, JSON.stringify(data));
            updateGroupDisplay();
        }

        function addWeight() {
            let p = parseInt(document.getElementById('poids-input').value);
            if(p > 0) {
                let data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}');
                data.points += p;
                localStorage.setItem(currentGroup, JSON.stringify(data));
                updateGroupDisplay();
            }
        }

        function resetScore() { if(confirm("Vider les points ?")) { localStorage.removeItem(currentGroup); updateGroupDisplay(); } }
        function addGlobalFish() { let t = parseInt(localStorage.getItem('globalFish') || 0) + 1; localStorage.setItem('globalFish', t); document.getElementById('global-fish-counter').innerText = t; }
        function resetGlobal() { if(confirm("Reset total ?")) { localStorage.setItem('globalFish', 0); document.getElementById('global-fish-counter').innerText = 0; } }
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function toggleGPS() { weatherData.temp = 22; calculateIndex(); alert("Météo actualisée (Simulation 22°C)"); }
    </script>
</body>
</html>

<script type="module">
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        
        const ADMIN_CODE = "1985"; 

        let currentUser = "Anonyme";
        let catches = [];
        let knots = [];
        let chatMessages = [];
        let currentSpotType = 'riviere';
        let gpsLoaded = false;
        
        // Initialisation de Firebase Auth
        const auth = getAuth(); 

        // FONCTION INSCRIPTION (Bien fermée !)
        window.inscrireDirectFirebase = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            
            if(!email || !pass) {
                alert("Veuillez remplir l'e-mail et le mot de passe.");
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Inscription réussie !");
            } catch (error) {
                alert("Erreur : " + error.message);
            }
        };

        // FONCTION DASHBOARD (Bien séparée)
        window.tbgDashboard = function() {
            const userIn = document.getElementById('username').value.trim();
            currentUser = userIn ? userIn : "Membre";

            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('dashboard-page').classList.add('flex');
            document.getElementById('bottom-nav').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            autoCalculateMoon();
            initGPSWeather();
            loadMockData();
        };

        // Reste de vos fonctions globales (liées à window pour les fusions de modules si nécessaire)
        window.switchTab = function(tabId) {
            document.querySelectorAll('.dashboard-tab').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            
            const navButtons = ['carnet', 'meteo', 'noeuds', 'chat'];
            navButtons.forEach(id => {
                const btn = document.getElementById(`nav-${id}`);
                if (id === tabId) {
                    btn.classList.add('text-[#4ac7f2]');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('text-[#4ac7f2]');
                    btn.classList.add('text-slate-400');
                }
            });

            if (tabId === 'chat') {
                const chatBox = document.getElementById('chat-box');
                setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
            }
        };

        window.requestDeletion = function(type, index) {
            const code = prompt("🔑 Seul le créateur peut supprimer. Entrez votre code secret :");
            if (code === ADMIN_CODE) {
                if (type === 'chat') {
                    chatMessages.splice(index, 1);
                    renderChat();
                } else if (type === 'catch') {
                    catches.splice(index, 1);
                    renderCatches();
                } else if (type === 'knot') {
                    knots.splice(index, 1);
                    renderKnots();
                }
                alert("Supprimé avec succès !");
            } else if (code !== null) {
                alert("❌ Code incorrect. Action refusée.");
            }
        };

        window.sendChatMessage = function() {
            const textInput = document.getElementById('chat-input');
            const fileInput = document.getElementById('chat-media');
            const text = textInput.value.trim();
            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (!text && fileInput.files.length === 0) return;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const isVideo = file.type.startsWith('video/');
                    chatMessages.push({
                        user: currentUser,
                        text: text,
                        time: timestamp,
                        mediaUrl: e.target.result,
                        isVideo: isVideo
                    });
                    renderChat();
                    resetChatForm();
                };
                reader.readAsDataURL(file);
            } else {
                chatMessages.push({
                    user: currentUser,
                    text: text,
                    time: timestamp,
                    mediaUrl: null,
                    isVideo: false
                });
                renderChat();
                resetChatForm();
            }
        };

        function resetChatForm() {
            document.getElementById('chat-form').reset();
            document.getElementById('chat-file-label').innerText = "Ajouter Photo ou Vidéo";
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';

            if (chatMessages.length === 0) {
                box.innerHTML = `<p class="text-xs text-slate-400 text-center italic mt-4">Aucun message. Lancez la discussion !</p>`;
                return;
            }

            chatMessages.forEach((msg, index) => {
                let mediaHtml = '';
                if (msg.mediaUrl) {
                    if (msg.isVideo) {
                        mediaHtml = `<video src="${msg.mediaUrl}" controls class="w-full max-h-48 object-contain rounded-lg mt-2 bg-black border border-white/10"></video>`;
                    } else {
                        const safeUrl = msg.mediaUrl.replace(/'/g, "\\'");
                        mediaHtml = `<img src="${msg.mediaUrl}" alt="Média partagé" class="w-full max-h-48 object-cover rounded-lg mt-2 cursor-pointer border border-white/10" onclick="openLightbox('${safeUrl}')">`;
                    }
                }

                box.innerHTML += `
                    <div class="bg-slate-900/50 p-2.5 rounded-xl border border-white/5 relative group">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs font-bold text-[#4ac7f2]">${msg.user}</span>
                                <span class="text-[9px] text-slate-400 ml-1.5">${msg.time}</span>
                            </div>
                            <button onclick="requestDeletion('chat', ${index})" class="text-slate-500 hover:text-rose-400 text-xs p-1 transition-colors" title="Supprimer">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        ${msg.text ? `<p class="text-xs text-slate-200 mt-1 leading-relaxed">${msg.text}</p>` : ''}
                        ${mediaHtml}
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
        }

        window.previewImageName = function(inputId, labelId) {
            const fileInput = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            if(fileInput.files.length > 0) {
                const name = fileInput.files[0].name;
                label.innerText = "📎 " + (name.length > 18 ? name.substring(0, 15) + "..." : name);
            }
        };

        window.saveCatch = function() {
            const species = document.getElementById('fish-species').value;
            const length = document.getElementById('fish-length').value;
            const weight = document.getElementById('fish-weight').value || '?';
            const lure = document.getElementById('fish-lure').value || 'Non spécifié';
            const fileInput = document.getElementById('fish-image');
            let imgUrl = "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=150&auto=format&fit=crop";

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    catches.unshift({ species, length, weight, lure, imgUrl: e.target.result });
                    renderCatches();
                    document.getElementById('catch-form').reset();
                    document.getElementById('file-label').innerText = "Ajouter la photo du poisson";
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                catches.unshift({ species, length, weight, lure, imgUrl });
                renderCatches();
                document.getElementById('catch-form').reset();
            }
        };

        function renderCatches() {
            const container = document.getElementById('catch-list');
            container.innerHTML = '';
            catches.forEach((c, idx) => {
                const safeUrl = c.imgUrl.replace(/'/g, "\\'");
                container.innerHTML += `
                    <div class="p-3 glass-card rounded-xl flex items-center gap-3 border-l-4 border-l-[#4ac7f2] relative">
                        <img src="${c.imgUrl}" alt="Poisson" class="w-14 h-14 object-cover rounded-lg bg-slate-800 flex-shrink-0 cursor-pointer" onclick="openLightbox('${safeUrl}')">
                        <div class="flex-1 min-w-0" onclick="openLightbox('${safeUrl}')">
                            <h5 class="text-xs font-bold truncate">${c.species}</h5>
                            <p class="text-[11px] text-slate-300">${c.length} cm • ${c.weight} kg • <span class="text-blue-300">${c.lure}</span></p>
                        </div>
                        <button onclick="requestDeletion('catch', ${idx})" class="text-slate-500 hover:text-rose-400 p-2 text-xs">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });
        }

        window.saveKnot = function() {
            const name = document.getElementById('knot-name').value;
            const type = document.getElementById('knot-type').value;
            const desc = document.getElementById('knot-desc').value || 'Aucune consigne.';
            const fileInput = document.getElementById('knot-image');

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    knots.unshift({ name, type, desc, imgUrl: e.target.result });
                    renderKnots();
                    document.getElementById('knot-form').reset();
                    document.getElementById('knot-file-label').innerText = "Prendre / Choisir une photo";
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        };

        function renderKnots() {
            const container = document.getElementById('knot-list');
            container.innerHTML = '';
            knots.forEach((k, idx) => {
                const safeUrl = k.imgUrl.replace(/'/g, "\\'");
                container.innerHTML += `
                    <div class="bg-slate-900/40 border border-[#4ac7f2]/20 rounded-xl p-3 space-y-2">
                        <div class="flex justify-between items-center">
                            <h4 class="text-xs font-bold text-[#4ac7f2] uppercase tracking-wide"><i class="fas fa-bullseye mr-1"></i> ${k.name}</h4>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] bg-blue-500/10 text-blue-300 px-1.5 py-0.5 rounded border border-blue-500/20">${k.type}</span>
                                <button onclick="requestDeletion('knot', ${idx})" class="text-slate-500 hover:text-rose-400 text-xs">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                        <div class="relative overflow-hidden rounded-lg border border-white/5 cursor-pointer" onclick="openLightbox('${safeUrl}')">
                            <img src="${k.imgUrl}" alt="${k.name}" class="w-full h-36 object-cover">
                        </div>
                        <p class="text-[11px] text-slate-300 leading-relaxed">${k.desc}</p>
                    </div>
                `;
            });
        }

        // --- Fonctions d'initialisation vides pour éviter les plantages au chargement ---
        window.updateMeteoSim = function() {};
        window.setSpotType = function(type) {};
        function autoCalculateMoon() { 
            document.getElementById('val-lune').innerText = "Pleine Lune"; // Exemple statique
            document.getElementById('bite-index').innerText = "75%";
            document.getElementById('bite-label').innerText = "Excellent";
        }
        function initGPSWeather() {
            document.getElementById('gps-status').innerHTML = "<i class='fas fa-check text-emerald-400'></i> GPS Connecté";
        }
        function loadMockData() {}
        
        // Fonctions Lightbox
        window.openLightbox = function(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        };
        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.add('hidden');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .underwater-bg { background: radial-gradient(circle at center, #0c1a26 0%, #050a0f 100%); }
        .glass-card { background: rgba(25, 59, 87, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(74, 199, 242, 0.2); border-radius: 1.5rem; }
    </style>
</head>
<body class="underwater-bg h-full text-white font-sans flex items-center justify-center p-4">

    <div id="login-screen" class="w-full max-w-sm p-8 glass-card text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-blue-300 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-slate-900 border border-blue-500/50 mb-6 text-center focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition-all shadow-lg">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md space-y-6">
        <h2 class="text-center text-xl font-bold text-blue-200">Mes Raccourcis Sécurisés</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <a href="https://www.facebook.com/share/g/1Fe5eQhNqP/" target="_blank" class="glass-card p-6 flex flex-col items-center hover:bg-blue-900/40 transition-all">
                <i class="fab fa-facebook text-4xl text-blue-500 mb-3"></i>
                <span class="text-sm font-bold">Facebook Groupe</span>
            </a>
            
            <a href="#" target="_blank" class="glass-card p-6 flex flex-col items-center hover:bg-purple-900/40 transition-all">
                <i class="fab fa-twitch text-4xl text-purple-500 mb-3"></i>
                <span class="text-sm font-bold">Twitch Pêche</span>
            </a>
        </div>
        
        <p class="text-center text-xs text-slate-500 mt-8">*Données stockées localement sur votre appareil.</p>
    </div>

    <script>
        function checkPass() {
            const p = document.getElementById('pass').value;
            // CHANGEZ '1234' par votre mot de passe secret
            if (p === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                alert("Mot de passe incorrect");
            }
        }
    </script>
</body>
</html>

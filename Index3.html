<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        .card { background: rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 2px solid #064e3b; }
        .btn-menu { background: #064e3b; color: white; padding: 8px; border-radius: 10px; font-weight: bold; font-size: 9px; cursor: pointer; text-transform: uppercase; }
        .btn-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
    </style>
</head>
<body class="p-2" onload="init()">

    <div class="max-w-md mx-auto">
        <!-- Barre de boutons principale -->
        <div class="flex flex-wrap justify-center gap-2 mb-4">
            <button onclick="window.location.reload()" class="btn-circle bg-red-500"><i class="fas fa-sync"></i></button>
            <button onclick="toggleGPS()" id="gps-btn" class="btn-circle bg-gray-600"><i class="fas fa-location-arrow"></i></button>
            <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q')" class="btn-circle bg-green-500"><i class="fab fa-whatsapp"></i></button>
            <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/')" class="btn-circle bg-blue-600"><i class="fab fa-facebook"></i></button>
            <button onclick="toggleSection('groupe-section')" class="btn-menu">Groupes</button>
            <button onclick="toggleSection('spots-section')" class="btn-menu">Spots</button>
            <button onclick="toggleSection('concours-section')" class="btn-menu">Concours</button>
        </div>

        <!-- Sections -->
        <div id="groupe-section" class="card hidden text-center">
            <div id="login-zone"><input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 border mb-2"><button onclick="checkPass()" class="w-full btn-menu bg-blue-600">ENTRER</button></div>
            <div id="score-zone" class="hidden">
                <div id="total-score" class="text-3xl font-black mb-2">0 pts</div>
                <button onclick="addFish()" class="w-full bg-blue-500 text-white p-2 rounded mb-2">+ 5 pts (Poisson)</button>
                <input type="number" id="poids" placeholder="Grammes" class="w-full p-2 border mb-2">
                <button onclick="addPoids()" class="w-full bg-orange-500 text-white p-2 rounded mb-2">+ 1 pt / gramme</button>
                <button onclick="resetScore()" class="w-full bg-red-600 text-white p-2 rounded">RESET POINTS</button>
            </div>
        </div>

        <div id="spots-section" class="card hidden">
            <h2 class="font-bold text-center mb-2">LISTE DES SPOTS</h2>
            <div id="spots-list" class="text-xs"></div>
        </div>

        <div id="concours-section" class="card hidden">
            <textarea class="w-full h-20 p-2 border" placeholder="Écrire ici..."></textarea>
        </div>

        <!-- Sélecteur Poisson -->
        <div class="card border-blue-500">
            <select id="fish-select" onchange="calc()" class="w-full p-2 border mb-2"></select>
            <img id="fish-img" src="" class="w-24 h-24 mx-auto mb-2 rounded-lg">
            <div class="text-center text-2xl font-black" id="prob-display">--%</div>
            <table class="w-full mt-2 text-center text-xs">
                <tr><td>RIVIÈRE</td><td id="riv-prob" class="font-bold">--</td></tr>
                <tr><td>LAC</td><td id="lac-prob" class="font-bold">--</td></tr>
            </table>
        </div>

        <!-- Compteur Global -->
        <div class="card text-center">
            <div id="global-counter" class="text-4xl font-black">0</div>
            <button onclick="addGlobal()" class="w-full bg-blue-600 text-white p-2 rounded mt-2">AJOUTER POISSON</button>
            <button onclick="resetGlobal()" class="text-red-600 underline text-[10px] mt-2">RESET TOTAL</button>
        </div>

        <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-xl">
    </div>

    <script>
        const fishData = {
            "Silure": "https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet": "https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass": "https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre": "https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon": "https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune": "https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème": "https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette": "https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon": "https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon": "https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne": "https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche": "https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe": "https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle": "https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille": "https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote": "https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin": "https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau": "https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite": "https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel": "https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat": "https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil": "https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière": "https://i.postimg.cc/h4ZJ81bD/bouviere.png"
        };
        let gpsActive = false;

        function init() {
            const sel = document.getElementById('fish-select');
            Object.keys(fishData).forEach(f => sel.innerHTML += `<option value="${f}">${f}</option>`);
            document.getElementById('global-counter').innerText = localStorage.getItem('globalFish') || 0;
            document.getElementById('total-score').innerText = (localStorage.getItem('pts') || 0) + " pts";
            const spots = document.getElementById('spots-list');
            for(let i=1; i<=15; i++) spots.innerHTML += `<div class="border-b py-1">Spot ${i} : Vide</div>`;
            calc();
        }

        function toggleGPS() {
            gpsActive = !gpsActive;
            document.getElementById('gps-btn').style.background = gpsActive ? '#22c55e' : '#4b5563';
            calc();
        }

        function calc() {
            const f = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishData[f];
            let base = 50 + (gpsActive ? 15 : 0);
            document.getElementById('prob-display').innerText = base + "%";
            document.getElementById('riv-prob').innerText = (base + 15) + "%";
            document.getElementById('lac-prob').innerText = base + "%";
        }

        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function checkPass() { if(document.getElementById('pass').value === "pass") { document.getElementById('login-zone').classList.add('hidden'); document.getElementById('score-zone').classList.remove('hidden'); } }
        function addFish() { let s = parseInt(localStorage.getItem('pts') || 0) + 5; localStorage.setItem('pts', s); document.getElementById('total-score').innerText = s + " pts"; }
        function addPoids() { let p = parseInt(document.getElementById('poids').value || 0); let s = parseInt(localStorage.getItem('pts') || 0) + p; localStorage.setItem('pts', s); document.getElementById('total-score').innerText = s + " pts"; }
        function resetScore() { if(confirm("CONFIRMER : Vider les points ?")) { localStorage.setItem('pts', 0); document.getElementById('total-score').innerText = "0 pts"; } }
        function addGlobal() { let v = parseInt(localStorage.getItem('globalFish') || 0) + 1; localStorage.setItem('globalFish', v); document.getElementById('global-counter').innerText = v; }
        function resetGlobal() { if(confirm("CONFIRMER : Tout réinitialiser ?")) { localStorage.setItem('globalFish', 0); document.getElementById('global-counter').innerText = 0; } }
    </script>
</body>
</html>

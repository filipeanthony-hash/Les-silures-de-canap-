<!DOCTYPE html>
<html lang="fr" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
        <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Thème visuel sous-marin dépoli haute qualité */
        .underwater-bg {
            background-image: linear-gradient(rgba(12, 26, 38, 0.6), rgba(12, 26, 38, 0.9)), 
                              url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Carte verre dépoli épurée */
        .glass-card {
            background: rgba(25, 59, 87, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(74, 199, 242, 0.15);
            border-radius: 2rem;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .input-marine {
            background: rgba(10, 25, 41, 0.6);
            border: 1px solid rgba(74, 199, 242, 0.15);
            color: white;
            transition: all 0.3s ease;
        }
        .input-marine:focus {
            border-color: #4ac7f2;
            box-shadow: 0 0 12px rgba(74, 199, 242, 0.6);
        }

        /* Styles pour l'anneau de progression */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.3s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Style des options de poisson */
        #fish-options {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(74, 199, 242, 0.2);
            border-radius: 1rem;
            margin-top: 5px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }
        #fish-options p {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        #fish-options p:hover {
            background: rgba(74, 199, 242, 0.1);
        }

        /* Sliders horizontaux épurés */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4ac7f2;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(74, 199, 242, 0.8);
        }
    </style>
</head>
<body class="underwater-bg flex flex-col h-full antialiased text-white font-sans overflow-hidden">

    <header class="glass-card text-white shadow-lg w-full fixed top-0 z-50 rounded-b-xl border-t-0 border-x-0">
        <div class="max-w-md mx-auto flex items-center justify-between px-6 py-4">
            <h1 class="text-2xl font-black tracking-tighter bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">
                Les Silures de Canapé
            </h1>
            <a href="https://www.facebook.com/share/g/1Ev1UqzWWy/" target="_blank" class="text-[#4ac7f2] hover:text-white text-3xl transition-all transform hover:scale-110" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
        </div>
    </header>

    <div id="login-page" class="flex flex-col items-center justify-center h-full px-6 pt-32 w-full max-w-md mx-auto">
        <div class="w-full p-10 space-y-7 glass-card relative z-10">
            <div class="text-center space-y-1.5">
                <p class="text-xs uppercase tracking-wider text-blue-300 font-bold">ESPACE MEMBRES</p>
                <p class="text-base text-slate-200">Connectez-vous pour activer le Dashboard</p>
            </div>

            <form id="auth-form" class="space-y-6" onsubmit="event.preventDefault();">
                <input id="email" type="email" required class="input-marine w-full p-4 rounded-xl text-lg" placeholder="Identifiant (e-mail)">
                <input id="password" type="password" required class="input-marine w-full p-4 rounded-xl text-lg" placeholder="Mot de passe">

                <div class="pt-3 space-y-4">
                    <button id="submit-login" type="button" class="w-full py-4 bg-blue-600 text-white rounded-xl text-lg font-black hover:bg-blue-500 transition-colors cursor-pointer">
                        Se connecter
                    </button>
                    <p class="text-sm text-center text-slate-400">
                        Pas encore de compte ? <a href="#" class="text-blue-300 font-bold">Créer un compte</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboard-page" class="hidden flex-col flex-1 pt-24 px-5 pb-24 space-y-5 overflow-y-auto w-full max-w-md mx-auto z-10 relative">
        
        <section class="glass-card p-8 flex flex-col items-center">
            <p class="text-sm uppercase tracking-widest text-blue-300 font-bold mb-1.5">MÉTÉO & PRÉDICTIONS GPS</p>
            <h2 class="text-3xl font-black mb-6 text-white tracking-tight">Indice d'activité</h2>

            <div class="relative w-44 h-44 flex items-center justify-center mb-6">
                <svg class="progress-ring" width="176" height="176">
                    <circle class="progress-ring__circle" stroke="#1c4b72" stroke-width="12" fill="transparent" r="80" cx="88" cy="88"/>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps { background-color: #57534e !important; }
        .bg-gps-active { background-color: #22c55e !important; }
        .bg-whatsapp { background-color: #25D366 !important; }
        .bg-facebook { background-color: #1877F2 !important; }
    </style>
</head>
<body class="river-bg font-sans p-2">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-1 pt-2 pb-1 flex-shrink-0">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-gps bg-gps-active"><i class="fas fa-location-arrow"></i></button>
                <h2 class="text-[8px] font-bold uppercase truncate max-w-[50px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-1 items-center">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="btn-circle bg-whatsapp"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="btn-circle bg-facebook"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-concours px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">CONCOURS</button>
            </div>
        </div>

        <div class="cards-scroll-area flex flex-col space-y-2 p-1">
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600"><h3 class="text-[10px] font-bold uppercase mb-2 text-purple-700">Page Concours</h3></div>
            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800"><h3 class="text-[10px] font-bold uppercase mb-2">Gestion des Scores</h3></div>
            <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb"><h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3></div>

            <div class="glass-card-river p-3 border-2 border-fb space-y-2">
                <select id="fish-select" onchange="calculateIndex()" class="w-full p-2 rounded-lg bg-blue-100 border border-fb text-[10px] font-black uppercase text-center text-blue-900">
                    <option value="Silure">SILURE - indice de probabilité</option>
                    <option value="Brochet">BROCHET</option>
                    <option value="Black Bass">BLACK BASS</option>
                    <option value="Sandre">SANDRE</option>
                    <option value="Goujon">GOUJON</option>
                    <option value="Perche commune">PERCHE COMMUNE</option>
                    <option value="Brème">BRÈME</option>
                    <option value="Ablette">ABLETTE</option>
                    <option value="Vairon">VAIRON</option>
                    <option value="Gardon">GARDON</option>
                    <option value="Chevesne">CHEVESNE</option>
                    <option value="Tanche">TANCHE</option>
                    <option value="Carpe">CARPE</option>
                    <option value="Rotengle">ROTENGLE</option>
                    <option value="Anguille">ANGUILLE</option>
                    <option value="Ide mélanote">IDE MÉLANOTE</option>
                    <option value="Carassin">CARASSIN</option>
                    <option value="Barbeau">BARBEAU</option>
                    <option value="Truite">TRUITE</option>
                    <option value="Truite arc-en-ciel">TRUITE ARC-EN-CIEL</option>
                    <option value="Poisson-chat">POISSON-CHAT</option>
                    <option value="Perche-soleil">PERCHE-SOLEIL</option>
                    <option value="Bouvière">BOUVIÈRE</option>
                </select>
                <div class="flex items-center justify-between">
                    <img id="fish-img" src="https://via.placeholder.com/160" alt="Poisson" class="w-20 h-20 rounded-xl object-cover">
                    <div class="text-right pl-4">
                        <div id="final-index" class="text-2xl font-black">--%</div>
                        <p id="weather-status" class="text-[8px] italic font-bold">...</p>
                    </div>
                </div>
            </div>
            
            <div class="glass-card-river overflow-hidden border-fb"><table class="w-full text-xs text-center"><tbody id="prob-table"></tbody></table></div>

            <div id="points-counter-card" class="glass-card-river overflow-hidden border-2 border-fb">
                <div class="bg-blue-100 p-2 text-blue-900 uppercase font-bold text-xs text-center border-b border-fb">Total Poissons Pêchés</div>
                <div class="p-4 text-center">
                    <div class="text-4xl font-black text-blue-900 mb-2" id="global-fish-counter">0</div>
                    <div class="flex gap-2">
                        <button onclick="addGlobalFish()" class="flex-grow btn-fb p-3 rounded-lg font-black text-xs text-white">AJOUTER</button>
                        <button onclick="resetGlobal()" class="bg-red-600 text-white px-3 rounded-lg font-black text-xs flex-shrink-0">RESET</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fishImages = { "Silure": "https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet": "https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass": "https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre": "https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon": "https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune": "https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème": "https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette": "https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon": "https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon": "https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne": "https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche": "https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe": "https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle": "https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille": "https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote": "https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin": "https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau": "https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite": "https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel": "https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat": "https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil": "https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière": "https://i.postimg.cc/h4ZJ81bD/bouviere.png" };
        const fishStats = { "Silure": { base: 65, pref: "p", ideal: 20 }, "Brochet": { base: 50, pref: "s", ideal: 12 }, "Black Bass": { base: 45, pref: "s", ideal: 22 }, "Sandre": { base: 55, pref: "p", ideal: 14 }, "Goujon": { base: 35, pref: "s", ideal: 15 }, "Perche commune": { base: 55, pref: "s", ideal: 16 }, "Brème": { base: 45, pref: "s", ideal: 18 }, "Ablette": { base: 50, pref: "s", ideal: 17 }, "Vairon": { base: 40, pref: "s", ideal: 12 }, "Gardon": { base: 55, pref: "s", ideal: 15 }, "Chevesne": { base: 45, pref: "s", ideal: 16 }, "Tanche": { base: 40, pref: "s", ideal: 19 }, "Carpe": { base: 45, pref: "s", ideal: 21 }, "Rotengle": { base: 45, pref: "s", ideal: 18 }, "Anguille": { base: 60, pref: "p", ideal: 17 }, "Ide mélanote": { base: 35, pref: "s", ideal: 15 }, "Carassin": { base: 40, pref: "s", ideal: 18 }, "Barbeau": { base: 50, pref: "s", ideal: 17 }, "Truite": { base: 70, pref: "s", ideal: 10 }, "Truite arc-en-ciel": { base: 65, pref: "s", ideal: 11 }, "Poisson-chat": { base: 50, pref: "s", ideal: 22 }, "Perche-soleil": { base: 45, pref: "s", ideal: 20 }, "Bouvière": { base: 30, pref: "s", ideal: 14 } };
        
        let gpsEnabled = true;
        let weatherData = { temp: 15, clouds: 50 };

        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishImages[fish];
            const stats = fishStats[fish];
            const isSunny = weatherData.clouds < 50;
            let prob = Math.floor(stats.base + ((stats.pref === "s" && isSunny) ? 12 : 0) + (8 - Math.abs(weatherData.temp - stats.ideal)));
            prob = Math.min(99, Math.max(10, prob));
            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('weather-status').innerText = (isSunny ? "☀️ " : "🌧️ ") + weatherData.temp.toFixed(1) + "°C";
            document.getElementById('prob-table').innerHTML = `<tr><td class="p-2 font-bold text-blue-900">RIVIÈRE</td><td class="p-2 font-bold">${Math.min(99, prob + 15)}%</td></tr><tr><td class="p-2 font-bold text-blue-900">LAC</td><td class="p-2 font-bold">${prob}%</td></tr>`;
        }

        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function addGlobalFish() { let t = parseInt(localStorage.getItem('globalFish')||0); localStorage.setItem('globalFish', t+1); document.getElementById('global-fish-counter').innerText = t+1; }
        function resetGlobal() { localStorage.setItem('globalFish', 0); document.getElementById('global-fish-counter').innerText = 0; }
        function toggleGPS() { location.reload(); }

        // Initialisation forcée
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('global-fish-counter').innerText = localStorage.getItem('globalFish') || 0;
            calculateIndex(); // Affiche le silure et le calcul dès le chargement
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: #e0f2f1; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps { background-color: #57534e !important; }
        .bg-gps-active { background-color: #22c55e !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
    </style>
</head>
<body class="p-2">
    <div id="main-container" class="w-full max-w-md mx-auto flex flex-col h-full">
        <!-- HEADER -->
        <div class="flex justify-between items-center px-1 pt-2 pb-2">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-gps bg-gps-active"><i class="fas fa-location-arrow"></i></button>
            </div>
            <div class="flex gap-1">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="btn-circle bg-[#25D366]"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="btn-circle btn-fb"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-1 rounded-lg text-[7px] font-black uppercase">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-1 rounded-lg text-[7px] font-black uppercase">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-concours px-2 py-1 rounded-lg text-[7px] font-black uppercase">CONCOURS</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2 pb-4">
            <!-- SECTIONS -->
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600">
                <p class="text-xs">Le prochain concours aura lieu dans quelques jours !</p>
            </div>

            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <select id="groupe-select" class="w-full p-2 mb-2 rounded text-xs"><option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option></select>
                <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 mb-2 rounded text-xs border">
                <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 rounded text-xs font-black">ENTRER</button>
                <div id="counter-part" class="hidden text-center mt-2">
                    <div id="total-score" class="text-3xl font-black">0 pts</div>
                    <button onclick="addScore()" class="w-full bg-orange-500 text-white p-2 mt-2 rounded text-xs font-black">+ 5 PTS</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 mt-1 rounded text-[9px]">RESET GROUPE</button>
                </div>
            </div>

            <div id="spots-section" class="hidden glass-card-river p-4 border-2 border-blue-400">
                <a href="https://www.google.com/maps/search/?api=1&query=36+Rue+René+Leblond+77220+Tournan-en-Brie" target="_blank" class="text-[10px] font-bold text-blue-900 underline">📍 36 Rue René Leblond, 77220 Tournan-en-Brie</a>
                <div id="spots-list" class="pt-2 text-[9px] text-gray-500"></div>
            </div>

            <!-- POISSONS -->
            <div class="glass-card-river p-3 border-2 border-blue-400">
                <select id="fish-select" onchange="updateUI()" class="w-full p-2 rounded bg-blue-100 text-[10px] font-black uppercase text-center"></select>
                <img id="fish-img" src="" class="w-20 h-20 mx-auto mt-2 rounded-xl">
                <div id="final-index" class="text-center text-2xl font-black mt-1">--%</div>
            </div>

            <div class="glass-card-river p-2">
                <table class="w-full text-center text-xs">
                    <tr><td class="font-bold">RIVIÈRE</td><td id="prob-riv" class="font-bold text-blue-600">--%</td></tr>
                    <tr><td class="font-bold">LAC</td><td id="prob-lac" class="font-bold text-blue-600">--%</td></tr>
                </table>
            </div>

            <!-- GLOBAL -->
            <div class="glass-card-river p-4 text-center border-2 border-blue-600">
                <div id="global-counter" class="text-4xl font-black text-blue-900">0</div>
                <button onclick="addGlobal()" class="w-full btn-fb p-2 rounded mt-2 text-xs">AJOUTER POISSON</button>
                <button onclick="resetGlobal()" class="w-full bg-red-600 text-white p-1 mt-2 text-[9px]">RESET GLOBAL</button>
            </div>
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl">
        </div>
    </div>

    <script>
        const fishData = { "Silure":"https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet":"https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass":"https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre":"https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon":"https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune":"https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème":"https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette":"https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon":"https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon":"https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne":"https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche":"https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe":"https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle":"https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille":"https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote":"https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin":"https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau":"https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite":"https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel":"https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat":"https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil":"https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière":"https://i.postimg.cc/h4ZJ81bD/bouviere.png" };
        
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function updateUI() { 
            const f = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishData[f];
            const base = gpsEnabled ? 75 : 40;
            document.getElementById('final-index').innerText = base + "%";
            document.getElementById('prob-riv').innerText = (base + 10) + "%";
            document.getElementById('prob-lac').innerText = base + "%";
        }
        
        let gpsEnabled = true;
        function toggleGPS() { gpsEnabled = !gpsEnabled; document.getElementById('gps-btn').classList.toggle('bg-gps-active', gpsEnabled); updateUI(); }
        
        function checkPass() { if(document.getElementById('pass').value === "pass123") document.getElementById('counter-part').classList.remove('hidden'); }
        function addScore() { let s = parseInt(localStorage.getItem('s')||0)+5; localStorage.setItem('s', s); document.getElementById('total-score').innerText = s + " pts"; }
        function resetScore() { if(confirm("Confirmer le reset des points ?")) { localStorage.setItem('s', 0); document.getElementById('total-score').innerText = "0 pts"; } }
        function addGlobal() { let g = parseInt(localStorage.getItem('g')||0)+1; localStorage.setItem('g', g); document.getElementById('global-counter').innerText = g; }
        function resetGlobal() { if(confirm("Confirmer le reset global ?")) { localStorage.setItem('g', 0); document.getElementById('global-counter').innerText = 0; } }

        document.addEventListener('DOMContentLoaded', () => {
            const s = document.getElementById('fish-select');
            Object.keys(fishData).forEach(f => s.innerHTML += `<option value="${f}">${f}</option>`);
            document.getElementById('global-counter').innerText = localStorage.getItem('g')||0;
            for(let i=1; i<=15; i++) document.getElementById('spots-list').innerHTML += `<div>Spot ${i}</div>`;
            updateUI();
        });
    </script>
</body>
</html>

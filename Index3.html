<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; overflow: hidden; background: #e0f2f1; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .btn-nav { padding: 8px 12px; border-radius: 8px; font-size: 7px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="p-2 flex flex-col">
    <div class="w-full max-w-md mx-auto flex flex-col h-full">
        <!-- HEADER -->
        <div class="flex justify-between items-center py-2 flex-shrink-0">
            <div class="flex gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-red-500"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-green-500"><i class="fas fa-location-arrow"></i></button>
            </div>
            <div class="flex gap-1">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="btn-circle bg-[#25D366]"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="btn-circle bg-[#1877F2]"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-nav bg-[#064e3b]">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-nav bg-[#1877F2]">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-nav bg-[#9333ea]">CONCOURS</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2">
            <!-- SECTIONS -->
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600">Le prochain concours approche !</div>
            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <div id="login-part"><input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 mb-2 rounded text-xs border"><button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 rounded text-xs font-black">ENTRER</button></div>
                <div id="counter-part" class="hidden text-center"><div id="total-score" class="text-3xl font-black">0 pts</div><button onclick="addScore()" class="w-full bg-orange-500 text-white p-2 rounded mt-2">+ 5 PTS</button><button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded mt-1 text-[9px]">RESET</button></div>
            </div>
            <div id="spots-section" class="hidden glass-card-river p-4 border-2 border-blue-400">
                <a href="https://www.google.com/maps/search/?api=1&query=36+Rue+René+Leblond+77220+Tournan-en-Brie" target="_blank" class="text-[10px] font-bold text-blue-900 underline">📍 36 Rue René Leblond, 77220 Tournan-en-Brie</a>
            </div>

            <!-- POISSONS : IMAGE GAUCHE, STATS DROITE -->
            <div class="glass-card-river p-3 border-2 border-blue-400">
                <select id="fish-select" onchange="updateUI()" class="w-full p-2 rounded bg-blue-100 text-[10px] font-black uppercase text-center"></select>
                <div class="flex items-center mt-2">
                    <img id="fish-img" src="" class="w-20 h-20 rounded-xl object-cover">
                    <div class="ml-4 text-right flex-1">
                        <div id="final-index" class="text-2xl font-black">--%</div>
                        <p id="weather-status" class="text-[8px] italic font-bold">☀️ 15°C</p>
                    </div>
                </div>
            </div>

            <div class="glass-card-river overflow-hidden border-2 border-blue-400">
                <table class="w-full text-center text-xs">
                    <tr><td class="p-2 font-bold text-blue-900">RIVIÈRE</td><td id="prob-riv" class="font-bold">--%</td></tr>
                    <tr><td class="p-2 font-bold text-blue-900">LAC</td><td id="prob-lac" class="font-bold">--%</td></tr>
                </table>
            </div>

            <!-- COMPTEUR TOTAL POISSONS -->
            <div class="glass-card-river overflow-hidden border-2 border-blue-400">
                <div class="bg-blue-100 p-2 text-blue-900 uppercase font-bold text-xs text-center">Total Poissons Pêchés</div>
                <div class="p-4 text-center">
                    <div id="global-counter" class="text-4xl font-black text-blue-900">0</div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="addGlobal()" class="flex-grow bg-[#1877F2] text-white p-2 rounded text-xs font-black">AJOUTER</button>
                        <button onclick="resetGlobal()" class="bg-red-600 text-white px-3 rounded text-[9px]">RESET</button>
                    </div>
                </div>
            </div>
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl pb-4">
        </div>
    </div>

    <script>
        const fishData = { "Silure":"https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet":"https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass":"https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre":"https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon":"https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune":"https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème":"https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette":"https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon":"https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon":"https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne":"https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche":"https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe":"https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle":"https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille":"https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote":"https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin":"https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau":"https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite":"https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel":"https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat":"https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil":"https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière":"https://i.postimg.cc/h4ZJ81bD/bouviere.png" };
        
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function updateUI() { 
            const f = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishData[f];
            const p = gpsEnabled ? 75 : 40;
            document.getElementById('final-index').innerText = p + "%";
            document.getElementById('prob-riv').innerText = (p + 15) + "%";
            document.getElementById('prob-lac').innerText = p + "%";
        }
        
        let gpsEnabled = true;
        function toggleGPS() { gpsEnabled = !gpsEnabled; document.getElementById('gps-btn').classList.toggle('bg-green-500', gpsEnabled); updateUI(); }
        
        function checkPass() { if(document.getElementById('pass').value === "pass123") document.getElementById('counter-part').classList.remove('hidden'); }
        function addScore() { let s = parseInt(localStorage.getItem('s')||0)+5; localStorage.setItem('s', s); document.getElementById('total-score').innerText = s + " pts"; }
        function resetScore() { if(confirm("Réinitialiser les points ?")) { localStorage.setItem('s', 0); document.getElementById('total-score').innerText = "0 pts"; } }
        function addGlobal() { let g = parseInt(localStorage.getItem('g')||0)+1; localStorage.setItem('g', g); document.getElementById('global-counter').innerText = g; }
        function resetGlobal() { if(confirm("Réinitialiser le total global ?")) { localStorage.setItem('g', 0); document.getElementById('global-counter').innerText = 0; } }

        document.addEventListener('DOMContentLoaded', () => {
            const s = document.getElementById('fish-select');
            Object.keys(fishData).forEach(f => s.innerHTML += `<option value="${f}">${f}</option>`);
            document.getElementById('global-counter').innerText = localStorage.getItem('g')||0;
            updateUI();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; overflow: hidden; margin: 0; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #app-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; height: 100%; }
        .snap-page { flex: 0 0 100%; scroll-snap-align: start; height: 100%; overflow-y: auto; padding: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .btn-fb { background-color: #1877F2 !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
        .bg-whatsapp { background-color: #25D366 !important; }
        .bg-facebook { background-color: #1877F2 !important; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps-active { background-color: #22c55e !important; }
    </style>
</head>
<body class="river-bg font-sans hide-scrollbar" onload="initApp()">

    <div id="app-slider" class="hide-scrollbar">
        <div class="snap-page">
            <div id="main-container" class="w-full max-w-md mx-auto">
                <div class="flex justify-between items-center px-1 pt-2 pb-1">
                    <div class="flex items-center gap-1">
                        <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                        <button id="gps-btn" class="btn-circle bg-gray-500 bg-gps-active"><i class="fas fa-location-arrow"></i></button>
                        <h2 class="text-[8px] font-bold uppercase" id="city-name">GPS</h2>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="btn-circle bg-whatsapp"><i class="fab fa-whatsapp"></i></button>
                        <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="btn-circle bg-facebook"><i class="fab fa-facebook"></i></button>
                        <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[7px] font-black uppercase">GROUPES</button>
                        <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-2 rounded-lg text-[7px] font-black uppercase">SPOTS</button>
                    </div>
                </div>

                <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800 my-2">... Gestion Groupes ...</div>
                <div id="spots-section" class="hidden glass-card-river p-4 border-2 border-blue-500 my-2">... Liste Spots ...</div>

                <div class="glass-card-river p-3 border-2 border-blue-500 my-2">
                    <marquee class="font-black uppercase">Bienvenue sur Les Silures de Canapé !</marquee>
                </div>

                <div class="glass-card-river p-3 border-2 border-blue-500">
                    <div class="flex items-center gap-3">
                        <img id="fish-img" src="https://via.placeholder.com/160" class="w-20 h-20 rounded-xl object-cover">
                        <div class="text-right">
                            <div id="final-index" class="text-3xl font-black">--%</div>
                        </div>
                    </div>
                    <select id="fish-select" class="w-full p-2 mt-2 rounded-lg bg-blue-100 text-[10px] font-black uppercase text-center">
                        <option>Silure</option><option>Brochet</option>...
                    </select>
                </div>

                <div class="glass-card-river mt-2 p-2"><table class="w-full text-center" id="prob-table"></table></div>
                <div class="glass-card-river mt-2 p-4 text-center">
                    <div class="text-4xl font-black" id="global-fish-counter">0</div>
                    <button onclick="addGlobalFish()" class="w-full btn-fb p-3 rounded-lg mt-2 font-black">AJOUTER POISSON</button>
                </div>
            </div>
        </div>

        <div id="extra-pages" class="contents"></div>
    </div>

    <script>
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function initApp() {
            const pages = ["Carnet", "Météo", "Galerie", "Nœuds", "Calendrier", "Poids", "Matériel", "Actualités", "Spots Pro", "Paramètres", "À Propos"];
            const container = document.getElementById('extra-pages');
            pages.forEach(t => {
                const div = document.createElement('div');
                div.className = 'snap-page p-4';
                div.innerHTML = `<div class="glass-card-river h-full flex items-center justify-center border-2 border-dashed border-teal-500"><h2 class="text-2xl font-black uppercase">${t}</h2></div>`;
                container.appendChild(div);
            });
        }
        function addGlobalFish() { /* ta logique */ }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-refresh { background-color: #ef4444 !important; color: white !important; }
        .btn-gps { background-color: #57534e !important; color: white !important; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
    </style>
</head>
<body class="river-bg font-sans p-2" onload="initApp()">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-2 pt-2 pb-1 flex-shrink-0">
            <div class="flex items-center gap-2">
                <button onclick="window.location.reload()" class="btn-refresh w-6 h-6 rounded flex items-center justify-center text-[10px]"><i class="fas fa-sync"></i></button>
                <button onclick="disableGPS()" class="btn-gps w-6 h-6 rounded flex items-center justify-center text-[10px]"><i class="fas fa-location-slash"></i></button>
                <h2 class="text-[9px] font-bold uppercase truncate max-w-[120px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="text-green-600 text-2xl"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="text-fb text-2xl"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-3 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">SPOTS</button>
            </div>
        </div>

        <div class="cards-scroll-area flex flex-col space-y-2">
            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <h3 class="text-[10px] font-bold uppercase mb-2">Gestion des Scores</h3>
                <div id="login-part" class="space-y-2">
                    <select id="groupe-select" class="w-full p-2 rounded text-xs"><option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option><option value="groupe3">Groupe 3</option><option value="groupe4">Groupe 4</option><option value="groupe5">Groupe 5</option></select>
                    <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 rounded text-xs border">
                    <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 rounded text-xs font-black">ENTRER</button>
                </div>
                <div id="counter-part" class="hidden text-center space-y-2">
                    <h4 id="group-title" class="font-bold text-xs uppercase"></h4>
                    <div class="text-4xl font-black" id="total-score">0 pts</div>
                    <button onclick="addFishToGroup()" class="w-full bg-orange-500 text-white p-2 rounded-lg font-black text-xs">+ 1 POISSON (5 pts)</button>
                    <input type="number" id="poids-input" placeholder="Grammes" class="w-full p-2 rounded text-xs border">
                    <button onclick="addWeight()" class="w-full bg-blue-600 text-white p-2 rounded-lg font-black text-xs">+ AJOUTER POIDS (en points)</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded text-[9px]">RESET</button>
                </div>
            </div>

            <div class="glass-card-river p-3 border-fb flex items-center gap-3">
                <i class="fas fa-bell text-fb text-xl"></i>
                <marquee behavior="scroll" direction="left" class="text-[14px] font-black uppercase">Bienvenue sur Les Silures de Canapé !</marquee>
            </div>

            <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb">
                <h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3>
                <p class="text-xs font-bold">36 Rue René Leblond, 77220 Tournan-en-Brie</p>
            </div>

            <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-white/50 border border-fb text-xs font-black">
                <option value="Silure">Silure</option><option value="Brochet">Brochet</option><option value="Black Bass">Black Bass</option>
                <option value="Sandre">Sandre</option><option value="Goujon">Goujon</option><option value="Perche commune">Perche commune</option>
                <option value="Brème">Brème</option><option value="Ablette">Ablette</option><option value="Vairon">Vairon</option>
                <option value="Gardon">Gardon</option><option value="Chevesne">Chevesne</option><option value="Tanche">Tanche</option>
                <option value="Carpe">Carpe</option><option value="Rotengle">Rotengle</option><option value="Anguille">Anguille</option>
                <option value="Ide mélanote">Ide mélanote</option><option value="Carassin">Carassin</option><option value="Barbeau">Barbeau</option>
                <option value="Truite">Truite</option><option value="Truite arc-en-ciel">Truite arc-en-ciel</option>
                <option value="Poisson-chat">Poisson-chat</option><option value="Perche-soleil">Perche-soleil</option><option value="Bouvière">Bouvière</option>
            </select>

            <div class="glass-card-river p-3 flex items-center justify-between border-2 border-fb">
                <img id="fish-img" src="https://via.placeholder.com/160" alt="Poisson" class="w-24 h-24 rounded-xl object-cover">
                <div class="text-right pl-4">
                    <div id="final-index" class="text-2xl font-black">--%</div>
                    <p id="weather-status" class="text-[8px] italic font-bold">...</p>
                </div>
            </div>
            
            <div class="glass-card-river overflow-hidden border-fb"><table class="w-full text-xs text-center"><tbody id="prob-table"></tbody></table></div>

            <div id="points-counter-card" class="glass-card-river overflow-hidden border-2 border-fb">
                <div class="bg-blue-100 p-2 text-blue-900 uppercase font-bold text-xs text-center border-b border-fb">Total Poissons Pêchés</div>
                <div class="p-4 text-center">
                    <div class="text-4xl font-black text-blue-900 mb-2" id="global-fish-counter">0</div>
                    <div class="flex gap-2">
                        <button onclick="addGlobalFish()" class="flex-grow btn-fb p-3 rounded-lg font-black text-xs text-white">AJOUTER</button>
                        <button onclick="resetGlobal()" class="bg-red-600 text-white px-3 rounded-lg font-black text-xs flex-shrink-0">RESET</button>
                    </div>
                </div>
            </div>

            <div class="pt-2 flex justify-center pb-2 flex-shrink-0 w-full">
                <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Logo" class="w-full rounded-2xl border-none shadow-xl object-cover">
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "000000"; 
        const passwords = { "groupe1":"pass123", "groupe2":"silureA", "groupe3":"brochet77", "groupe4":"canap2026", "groupe5":"pecheur99" };
        const fishStats = { "Silure": { base: 65, pref: "p", ideal: 20 }, "Brochet": { base: 50, pref: "s", ideal: 12 }, "Black Bass": { base: 45, pref: "s", ideal: 22 }, "Sandre": { base: 55, pref: "p", ideal: 14 }, "Goujon": { base: 35, pref: "s", ideal: 15 }, "Perche commune": { base: 55, pref: "s", ideal: 16 }, "Brème": { base: 45, pref: "s", ideal: 18 }, "Ablette": { base: 50, pref: "s", ideal: 17 }, "Vairon": { base: 40, pref: "s", ideal: 12 }, "Gardon": { base: 55, pref: "s", ideal: 15 }, "Chevesne": { base: 45, pref: "s", ideal: 16 }, "Tanche": { base: 40, pref: "s", ideal: 19 }, "Carpe": { base: 45, pref: "s", ideal: 21 }, "Rotengle": { base: 45, pref: "s", ideal: 18 }, "Anguille": { base: 60, pref: "p", ideal: 17 }, "Ide mélanote": { base: 35, pref: "s", ideal: 15 }, "Carassin": { base: 40, pref: "s", ideal: 18 }, "Barbeau": { base: 50, pref: "s", ideal: 17 }, "Truite": { base: 70, pref: "s", ideal: 10 }, "Truite arc-en-ciel": { base: 65, pref: "s", ideal: 11 }, "Poisson-chat": { base: 50, pref: "s", ideal: 22 }, "Perche-soleil": { base: 45, pref: "s", ideal: 20 }, "Bouvière": { base: 30, pref: "s", ideal: 14 } };
        const fishImages = { "Silure": "", "Brochet": "", "Black Bass": "", "Sandre": "", "Goujon": "", "Perche commune": "", "Brème": "", "Ablette": "", "Vairon": "", "Gardon": "", "Chevesne": "", "Tanche": "", "Carpe": "", "Rotengle": "", "Anguille": "", "Ide mélanote": "", "Carassin": "", "Barbeau": "", "Truite": "", "Truite arc-en-ciel": "", "Poisson-chat": "", "Perche-soleil": "", "Bouvière": "" };

        let currentGroup = null;
        let weatherData = { temp: 15, clouds: 50 };

        function disableGPS() { if(confirm("Désactiver le GPS et passer en manuel ?")) { document.getElementById('city-name').innerText = "MANUEL"; weatherData = { temp: 20, clouds: 20 }; calculateIndex(); } }
        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function checkPass() { const g = document.getElementById('groupe-select').value; if(document.getElementById('pass').value === passwords[g]) { currentGroup = g; document.getElementById('login-part').classList.add('hidden'); document.getElementById('counter-part').classList.remove('hidden'); document.getElementById('group-title').innerText = g.toUpperCase(); updateGroupDisplay(); } else { alert("Code incorrect"); } }
        function updateGroupDisplay() { const data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}'); document.getElementById('total-score').innerText = data.points + " pts"; }
        function addFishToGroup() { let data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}'); data.points += 5; localStorage.setItem(currentGroup, JSON.stringify(data)); updateGroupDisplay(); }
        function addWeight() { const p = parseInt(document.getElementById('poids-input').value); if(!isNaN(p) && p > 0) { let data = JSON.parse(localStorage.getItem(currentGroup) || '{"points":0}'); data.points += p; localStorage.setItem(currentGroup, JSON.stringify(data)); document.getElementById('poids-input').value = ""; updateGroupDisplay(); } }
        function resetScore() { if(confirm("Vider les points ?")) { localStorage.removeItem(currentGroup); updateGroupDisplay(); } }
        function addGlobalFish() { let total = parseInt(localStorage.getItem('globalFish') || 0); localStorage.setItem('globalFish', total + 1); document.getElementById('global-fish-counter').innerText = total + 1; }
        function resetGlobal() { if(confirm("Reset total ?")) { localStorage.setItem('globalFish', 0); document.getElementById('global-fish-counter').innerText = 0; } }

        async function initApp() {
            document.getElementById('global-fish-counter').innerText = localStorage.getItem('globalFish') || 0;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude, lon = pos.coords.longitude;
                    try {
                        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
                        const d = await res.json();
                        if (d.name) { document.getElementById('city-name').innerText = d.name.toUpperCase(); }
                        if (d.main) { weatherData.temp = d.main.temp; weatherData.clouds = d.clouds.all; calculateIndex(); }
                    } catch (e) { document.getElementById('city-name').innerText = "LAT: " + lat.toFixed(2); }
                });
            }
        }
        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            document.getElementById('fish-img').src = fishImages[fish] || "https://via.placeholder.com/160";
            const stats = fishStats[fish] || { base: 50, pref: "s", ideal: 15 };
            const isSunny = weatherData.clouds < 50;
            let prob = Math.floor(stats.base + ((stats.pref === "s" && isSunny) ? 12 : 0) + (8 - Math.abs(weatherData.temp - stats.ideal)));
            prob = Math.min(99, Math.max(10, prob));
            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('weather-status').innerText = (isSunny ? "☀️ " : "🌧️ ") + weatherData.temp.toFixed(1) + "°C";
            document.getElementById('prob-table').innerHTML = `<tr><td class="p-2 font-bold text-blue-900">RIVIÈRE</td><td class="p-2 font-bold">${Math.min(99, prob + 15)}%</td></tr><tr><td class="p-2 font-bold text-blue-900">LAC</td><td class="p-2 font-bold">${prob}%</td></tr>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps { background-color: #57534e !important; }
        .bg-gps-active { background-color: #22c55e !important; }
    </style>
</head>
<body class="river-bg font-sans p-2" onload="initApp()">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-1 pt-2 pb-1">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-gps"><i class="fas fa-location-arrow"></i></button>
                <h2 class="text-[8px] font-bold uppercase truncate max-w-[50px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-1 items-center">
                <button onclick="toggleSection('groupe-section')" class="bg-green-800 text-white px-2 py-2 rounded-lg text-[7px] font-black uppercase">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="bg-blue-600 text-white px-2 py-2 rounded-lg text-[7px] font-black uppercase">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="bg-purple-600 text-white px-2 py-2 rounded-lg text-[7px] font-black uppercase">CONCOURS</button>
            </div>
        </div>

        <div class="cards-scroll-area flex flex-col space-y-2 p-1">
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600">
                <h3 class="text-[10px] font-bold uppercase mb-2">Concours</h3>
                <textarea class="w-full h-20 p-2 text-xs border rounded"></textarea>
            </div>

            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <div id="login-part">
                    <select id="groupe-select" class="w-full p-2 text-xs"><option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option></select>
                    <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 my-2 text-xs border">
                    <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 text-xs font-black">ENTRER</button>
                </div>
                <div id="counter-part" class="hidden text-center">
                    <div class="text-3xl font-black" id="total-score">0 pts</div>
                    <button onclick="addFishToGroup()" class="w-full bg-orange-500 text-white p-2 my-1 text-xs">+ 5 pts</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 text-[9px]">RESET</button>
                </div>
            </div>

            <div id="spots-section" class="hidden glass-card-river p-4 border-2 border-blue-500">
                <div id="spots-list" class="text-[9px]"></div>
            </div>

            <div class="glass-card-river p-3 border-2 border-blue-500 flex flex-col gap-2">
                <select id="fish-select" onchange="calculateIndex()" class="w-full p-2 bg-blue-100 text-xs font-bold uppercase text-center rounded-xl"></select>
                <div class="flex items-center justify-between">
                    <img id="fish-img" src="https://via.placeholder.com/160" class="w-20 h-20 rounded-xl object-cover">
                    <div class="text-right">
                        <div id="final-index" class="text-2xl font-black">--%</div>
                        <p id="weather-status" class="text-[8px] font-bold">...</p>
                    </div>
                </div>
                <table class="w-full text-xs text-center" id="prob-table"></table>
            </div>

            <div class="glass-card-river p-4 border-2 border-blue-500 text-center">
                <div class="text-blue-900 font-bold text-xs uppercase">Total Poissons Pêchés</div>
                <div id="global-fish-counter" class="text-4xl font-black">0</div>
                <button onclick="addGlobalFish()" class="w-full bg-blue-600 text-white p-2 my-2 rounded font-black text-xs">AJOUTER</button>
                <button onclick="resetGlobal()" class="text-red-600 text-[10px] font-bold underline">RESET TOTAL</button>
            </div>

            <div class="pt-2 pb-4">
                <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Logo" class="w-full rounded-2xl shadow-xl">
            </div>
        </div>
    </div>

    <script>
        const fishList = ["Silure", "Brochet", "Black Bass", "Sandre", "Goujon", "Perche commune", "Brème", "Ablette", "Vairon", "Gardon", "Chevesne", "Tanche", "Carpe", "Rotengle", "Anguille", "Ide mélanote", "Carassin", "Barbeau", "Truite", "Truite arc-en-ciel", "Poisson-chat", "Perche-soleil", "Bouvière"];
        
        function initApp() {
            const sel = document.getElementById('fish-select');
            fishList.forEach(f => sel.innerHTML += `<option value="${f}">${f.toUpperCase()}</option>`);
            document.getElementById('global-fish-counter').innerText = localStorage.getItem('globalFish') || 0;
            
            const spots = document.getElementById('spots-list');
            for(let i=1; i<=15; i++) spots.innerHTML += `<div class="border-b py-1">Spot ${i} : --</div>`;
        }

        function toggleGPS() {
            if(confirm("Activer la localisation ?")) {
                document.getElementById('gps-btn').classList.add('bg-gps-active');
                document.getElementById('city-name').innerText = "LOCALISÉ";
            }
        }

        function calculateIndex() {
            let prob = Math.floor(Math.random() * 60) + 30;
            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('prob-table').innerHTML = `<tr><td>RIVIÈRE: ${prob+15}%</td><td>LAC: ${prob}%</td></tr>`;
        }

        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        function checkPass() { document.getElementById('login-part').classList.add('hidden'); document.getElementById('counter-part').classList.remove('hidden'); }
        function resetScore() { if(confirm("Vider les points du groupe ?")) { /* Logique reset */ } }
        function addGlobalFish() { let v = parseInt(document.getElementById('global-fish-counter').innerText) + 1; localStorage.setItem('globalFish', v); document.getElementById('global-fish-counter').innerText = v; }
        function resetGlobal() { if(confirm("Confirmer le reset total des poissons ?")) { localStorage.setItem('globalFish', 0); document.getElementById('global-fish-counter').innerText = 0; } }
    </script>
</body>
</html>

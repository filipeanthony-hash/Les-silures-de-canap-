<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Hub Sécurisé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-bg { background: rgba(12, 26, 38, 0.85); backdrop-filter: blur(20px); }
        .glass-card { background: rgba(25, 59, 87, 0.25); border: 1px solid rgba(74, 199, 242, 0.15); border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-slate-900 h-full text-white font-sans flex items-center justify-center">

    <div id="login-screen" class="w-full max-w-sm p-6 glass-card text-center">
        <h2 class="text-xl font-bold mb-4">Accès Privé</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-3 rounded-lg bg-slate-800 border border-blue-500 mb-4 text-center">
        <button onclick="checkPass()" class="w-full py-3 bg-blue-600 rounded-lg font-bold">Entrer</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md p-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Mes Raccourcis</h2>
        <div class="grid grid-cols-2 gap-4">
            <a href="https://facebook.com" class="glass-card p-6 flex flex-col items-center hover:bg-blue-900/30">
                <span class="text-3xl mb-2">📘</span>
                <span class="text-sm font-bold">https://www.facebook.com/share/g/1Fe5eQhNqP/</span>
            </a>
            </div>
    </div>

    <script>
        function checkPass() {
            const p = document.getElementById('pass').value;
            // REMPLACEZ '1234' par votre mot de passe
            if (p === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                alert("Accès refusé");
            }
        }
    </script>
</body>
</html>

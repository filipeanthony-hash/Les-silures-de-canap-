<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.3); }
        .btn { padding: 0.5rem; border-radius: 0.5rem; font-weight: 900; font-size: 0.6rem; text-transform: uppercase; }
    </style>
</head>
<body class="p-2">
    <div class="max-w-md mx-auto w-full h-full flex flex-col space-y-2">
        <div class="flex justify-between items-center glass p-2">
            <button onclick="location.reload()" class="bg-red-500 text-white rounded-full w-8 h-8"><i class="fas fa-sync"></i></button>
            <button id="gps-btn" onclick="toggleGPS()" class="bg-green-500 text-white rounded-full w-8 h-8"><i class="fas fa-location-arrow"></i></button>
            <div class="flex gap-1">
                <button onclick="toggleView('groupe-section')" class="bg-green-900 text-white btn">GROUPES</button>
                <button onclick="toggleView('spots-section')" class="bg-blue-600 text-white btn">SPOTS</button>
                <button onclick="toggleView('concours-section')" class="bg-purple-600 text-white btn">CONCOURS</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2">
            <div id="concours-section" class="hidden glass p-4 border-2 border-purple-600">Le prochain concours aura lieu dans quelques jours !</div>
            
            <div id="groupe-section" class="hidden glass p-4 border-2 border-green-900">
                <select id="groupe-select" class="w-full p-2 mb-2 text-xs">
                    <option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option>
                    <option value="groupe3">Groupe 3</option><option value="groupe4">Groupe 4</option><option value="groupe5">Groupe 5</option>
                </select>
                <input type="password" id="pass" class="w-full p-2 mb-2 text-xs border" placeholder="Mot de passe">
                <button onclick="checkPass()" class="w-full bg-green-900 text-white p-2 rounded text-xs font-black">ENTRER</button>
                <div id="counter-part" class="hidden text-center">
                    <div id="total-score" class="text-3xl font-black">0 pts</div>
                    <button onclick="addScore(5)" class="w-full bg-orange-500 text-white p-2 my-2 rounded font-black">+ 1 POISSON (5 pts)</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded text-[9px]">RESET SCORE</button>
                </div>
            </div>

            <div id="spots-section" class="hidden glass p-4 space-y-1">
                <a href="#" class="text-blue-900 font-bold underline text-xs">📍 36 Rue René Leblond, Tournan-en-Brie</a>
                <div id="spots-list" class="pt-2 border-t text-[10px]"></div>
            </div>

            <div class="glass p-3 border-2 border-blue-600">
                <select id="fish-select" onchange="updateFish()" class="w-full p-2 rounded bg-blue-100 text-xs font-black uppercase text-center"></select>
                <img id="fish-img" src="" class="w-20 h-20 mx-auto my-2 rounded-xl object-cover">
                <div id="final-index" class="text-center text-xl font-black">--%</div>
            </div>

            <div class="glass p-4 text-center">
                <div id="global-counter" class="text-4xl font-black text-blue-900">0</div>
                <button onclick="addGlobal()" class="w-full bg-blue-600 text-white p-2 rounded mt-2">AJOUTER POISSON</button>
                <button onclick="resetGlobal()" class="w-full bg-red-600 text-white p-1 mt-2 text-[9px]">RESET GLOBAL</button>
            </div>
            
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" class="w-full rounded-2xl">
        </div>
    </div>

    <script>
        const fishData = { "Silure":"https://i.postimg.cc/8k2cNq9Z/Pngtree-catfish-clipart-illustration-digital-art-16698862-1.png", "Brochet":"https://i.postimg.cc/J7xHm1Zv/1000022375.png", "Black Bass":"https://i.postimg.cc/4d9CPNZn/1000022377.png", "Sandre":"https://i.postimg.cc/2yhV84s4/sandre.png", "Goujon":"https://i.postimg.cc/sxjwg7sQ/sullo-sander-lucioperca-480x480-(2)-(1)-(1).png", "Perche commune":"https://i.postimg.cc/jSMXML6r/Poisson-Perche-1-1024x511-(2)-(1).png", "Brème":"https://i.postimg.cc/CL9q0x9L/Illustration-breme-commune-CC-Dunbar-P.png", "Ablette":"https://i.postimg.cc/RZsVmsWn/ablette.png", "Vairon":"https://i.postimg.cc/1txSRLsq/vairon.png", "Gardon":"https://i.postimg.cc/htfRLSGJ/gardon.png", "Chevesne":"https://i.postimg.cc/SQrBHX23/Illustration-chevesne-CC-Dunbar-P.png", "Tanche":"https://i.postimg.cc/q7VDN0hW/Illustration-tanche-CC-Dunbar-P.png", "Carpe":"https://i.postimg.cc/wvWkQdMW/R-(2).png", "Rotengle":"https://i.postimg.cc/Z5rFDN0Y/R-(3).png", "Anguille":"https://i.postimg.cc/DwZXkYvS/202409-Japanese-eel.png", "Ide mélanote":"https://i.postimg.cc/zfh38s9m/ide-melanote.png", "Carassin":"https://i.postimg.cc/0QfkNPnt/Illustration-carassin-commun.png", "Barbeau":"https://i.postimg.cc/8c20QrvX/barbeau.png", "Truite":"https://i.postimg.cc/JhsYnqq8/Truite-detouree-e1513789345352.png", "Truite arc-en-ciel":"https://i.postimg.cc/66fcBgXC/Illustration-truite-arc-en-ciel.png", "Poisson-chat":"https://i.postimg.cc/8Pnh5Vnj/poisson-chat2.png", "Perche-soleil":"https://i.postimg.cc/nc5DxGCh/perche-soleil2.png", "Bouvière":"https://i.postimg.cc/h4ZJ81bD/bouviere.png" };
        const passwords = { "groupe1":"pass123", "groupe2":"silureA", "groupe3":"brochet77", "groupe4":"canap2026", "groupe5":"pecheur99" };

        function toggleView(id) { document.getElementById(id).classList.toggle('hidden'); }
        function updateFish() { const s = document.getElementById('fish-select'); document.getElementById('fish-img').src = fishData[s.value]; }
        
        function checkPass() {
            const g = document.getElementById('groupe-select').value;
            if(document.getElementById('pass').value === passwords[g]) {
                document.getElementById('counter-part').classList.remove('hidden');
                document.getElementById('total-score').innerText = (localStorage.getItem(g)||0) + " pts";
            } else alert("Mauvais mot de passe");
        }

        function addScore(pts) { const g = document.getElementById('groupe-select').value; let s = parseInt(localStorage.getItem(g)||0)+pts; localStorage.setItem(g, s); document.getElementById('total-score').innerText = s + " pts"; }
        function resetScore() { const g = document.getElementById('groupe-select').value; if(confirm("Réinitialiser ce groupe ?")) { localStorage.setItem(g, 0); document.getElementById('total-score').innerText = "0 pts"; } }
        function addGlobal() { let t = parseInt(localStorage.getItem('global')||0)+1; localStorage.setItem('global', t); document.getElementById('global-counter').innerText = t; }
        function resetGlobal() { if(confirm("Réinitialiser tout ?")) { localStorage.setItem('global', 0); document.getElementById('global-counter').innerText = 0; } }

        document.addEventListener('DOMContentLoaded', () => {
            const s = document.getElementById('fish-select');
            Object.keys(fishData).forEach(f => s.innerHTML += `<option value="${f}">${f}</option>`);
            document.getElementById('global-counter').innerText = localStorage.getItem('global')||0;
            for(let i=1; i<=15; i++) document.getElementById('spots-list').innerHTML += `<p>Emplacement ${i}</p>`;
            updateFish();
        });
    </script>
</body>
</html>

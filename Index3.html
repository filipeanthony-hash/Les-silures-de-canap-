<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; }
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .cards-scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; flex-shrink: 0; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .btn-groupe { background-color: #064e3b !important; color: white !important; }
        .btn-concours { background-color: #9333ea !important; color: white !important; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 16px; }
        .bg-refresh { background-color: #ef4444 !important; }
        .bg-gps { background-color: #57534e !important; }
        .bg-gps-active { background-color: #22c55e !important; }
        .bg-whatsapp { background-color: #25D366 !important; }
        .bg-facebook { background-color: #1877F2 !important; }
    </style>
</head>
<body class="river-bg font-sans p-2">

    <div id="main-container" class="w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-1 pt-2 pb-1 flex-shrink-0">
            <div class="flex items-center gap-1">
                <button onclick="window.location.reload()" class="btn-circle bg-refresh"><i class="fas fa-sync"></i></button>
                <button id="gps-btn" onclick="toggleGPS()" class="btn-circle bg-gps bg-gps-active"><i class="fas fa-location-arrow"></i></button>
                <h2 class="text-[8px] font-bold uppercase truncate max-w-[50px]" id="city-name">GPS...</h2>
            </div>
            <div class="flex gap-1 items-center">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="btn-circle bg-whatsapp"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="btn-circle bg-facebook"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSection('groupe-section')" class="btn-groupe px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">GROUPES</button>
                <button onclick="toggleSection('spots-section')" class="btn-fb px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">SPOTS</button>
                <button onclick="toggleSection('concours-section')" class="btn-concours px-2 py-2 rounded-lg text-[7px] font-black uppercase shadow-lg">CONCOURS</button>
            </div>
        </div>

        <div class="cards-scroll-area flex flex-col space-y-2 p-1">
            <div id="concours-section" class="hidden glass-card-river p-4 border-2 border-purple-600">
                <h3 class="text-[10px] font-bold uppercase mb-2 text-purple-700">Page Concours</h3>
                <p class="text-xs">Le prochain concours aura lieu dans quelques jours, restez connectés !</p>
            </div>

            <div id="groupe-section" class="hidden glass-card-river p-4 border-2 border-green-800">
                <h3 class="text-[10px] font-bold uppercase mb-2">Gestion des Scores</h3>
                <div id="login-part" class="space-y-2">
                    <select id="groupe-select" class="w-full p-2 rounded text-xs"><option value="groupe1">Groupe 1</option><option value="groupe2">Groupe 2</option><option value="groupe3">Groupe 3</option><option value="groupe4">Groupe 4</option><option value="groupe5">Groupe 5</option></select>
                    <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-2 rounded text-xs border">
                    <button onclick="checkPass()" class="w-full bg-green-800 text-white p-2 rounded text-xs font-black">ENTRER</button>
                </div>
                <div id="counter-part" class="hidden text-center space-y-2">
                    <h4 id="group-title" class="font-bold text-xs uppercase"></h4>
                    <div class="text-4xl font-black" id="total-score">0 pts</div>
                    <button onclick="addFishToGroup()" class="w-full bg-orange-500 text-white p-2 rounded-lg font-black text-xs">+ 1 POISSON (5 pts)</button>
                    <input type="number" id="poids-input" placeholder="Grammes" class="w-full p-2 rounded text-xs border">
                    <button onclick="addWeight()" class="w-full bg-blue-600 text-white p-2 rounded-lg font-black text-xs">+ AJOUTER POIDS (pts)</button>
                    <button onclick="resetScore()" class="w-full bg-red-600 text-white p-1 rounded text-[9px]">RESET</button>
                </div>
            </div>

            <div class="glass-card-river p-3 border-fb flex items-center gap-3">
                <i class="fas fa-bell text-fb text-xl"></i>
                <marquee behavior="scroll" direction="left" class="text-[14px] font-black uppercase">Bienvenue sur Les Silures de Canapé !</marquee>
            </div>

            <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb">
                <h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3>
                <a href="https://www.google.com/maps/search/?api=1&query=36+Rue+René+Leblond+77220+Tournan-en-Brie" target="_blank" class="block w-full p-2 bg-blue-50 border border-fb rounded-lg text-[10px] font-bold text-blue-900 underline mb-2">📍 36 Rue René Leblond, 77220 Tournan-en-Brie</a>
                <div class="border-t border-dashed border-gray-400 pt-2 space-y-1" id="spots-list"></div>
            </div>

            <div class="glass-card-river p-3 border-2 border-fb space-y-2">
                <select id="fish-select" onchange="calculateIndex()" class="w-full p-2 rounded-lg bg-blue-100 border border-fb text-[10px] font-black uppercase text-center text-blue-900">
                    <option value="Silure">SILURE - indice de probabilité</option>
                    <option value="Brochet">BROCHET</option>
                    <option value="Black Bass">BLACK BASS</option>
                    <option value="Sandre">SANDRE</option>
                </select>
                <div class="flex items-center justify-between">
                    <img id="fish-img" src="" alt="Poisson" class="w-20 h-20 rounded-xl object-cover">
                    <div class="text-right pl-4">
                        <div id="final-index" class="text-2xl font-black">--%</div>
                        <p id="weather-status" class="text-[8px] italic font-bold">...</p>
                    </div>
                </div>
            </div>
            
            <div class="glass-card-river overflow-hidden border-fb"><table class="w-full text-xs text-center"><tbody id="prob-table"></tbody></table></div>

            <div id="points-counter-card" class="glass-card-river overflow-hidden border-2 border-fb">
                <div class="bg-blue-100 p-2 text-blue-900 uppercase font-bold text-xs text-center border-b border-fb">Total Poissons Pêchés</div>
                <div class="p-4 text-center">
                    <div class="text-4xl font-black text-blue-900 mb-2" id="global-fish-counter">0</div>
                    <div class="flex gap-2">
                        <button onclick="addGlobalFish()" class="flex-grow btn-fb p-3 rounded-lg font-black text-xs text-white">AJOUTER</button>
                        <button onclick="resetGlobal()" class="bg-red-600 text-white px-3 rounded-lg font-black text-xs flex-shrink-0">RESET</button>
                    </div>
                </div>
            </div>
            
            <div class="pt-2 flex justify-center pb-2 flex-shrink-0 w-full">
                <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Logo" class="w-full rounded-2xl border-none shadow-xl object-cover">
            </div>
        </div>
    </div>

    <script>
        const passwords = { "groupe1":"pass123", "groupe2":"silureA", "groupe3":"brochet77", "groupe4":"canap2026", "groupe5":"pecheur99" };
        let gpsEnabled = true;
        let weatherData = { temp: 15, clouds: 40 };

        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function calculateIndex() {
            const fish = document.getElementById('fish-select').value;
            const isSunny = weatherData.clouds < 50;
            let prob = Math.floor(50 + (isSunny ? 15 : 0) + (10 - Math.abs(weatherData.temp - 18)));
            prob = Math.min(99, Math.max(10, prob));
            document.getElementById('final-index').innerText = prob + "%";
            document.getElementById('weather-status').innerText = (isSunny ? "☀️ " : "🌧️ ") + weatherData.temp + "°C";
            document.getElementById('prob-table').innerHTML = `<tr><td class="p-2 font-bold text-blue-900">RIVIÈRE</td><td class="p-2 font-bold">${Math.min(99, prob + 10)}%</td></tr><tr><td class="p-2 font-bold text-blue-900">LAC</td><td class="p-2 font-bold">${prob}%</td></tr>`;
        }

        function toggleGPS() {
            gpsEnabled = !gpsEnabled;
            document.getElementById('gps-btn').classList.toggle('bg-gps-active', gpsEnabled);
            weatherData = gpsEnabled ? { temp: 15, clouds: 40 } : { temp: 10, clouds: 80 };
            document.getElementById('city-name').innerText = gpsEnabled ? "TOURNAN" : "MANUEL";
            calculateIndex();
        }

        function checkPass() {
            const g = document.getElementById('groupe-select').value;
            if(document.getElementById('pass').value === passwords[g]) {
                document.getElementById('login-part').classList.add('hidden');
                document.getElementById('counter-part').classList.remove('hidden');
                document.getElementById('group-title').innerText = g.toUpperCase();
                updateDisplay(g);
            } else { alert("Code incorrect"); }
        }

        function updateDisplay(g) { document.getElementById('total-score').innerText = (localStorage.getItem(g) || 0) + " pts"; }
        function addFishToGroup() { const g = document.getElementById('groupe-select').value; let s = parseInt(localStorage.getItem(g)||0); localStorage.setItem(g, s+5); updateDisplay(g); }
        function addWeight() { const g = document.getElementById('groupe-select').value; const p = parseInt(document.getElementById('poids-input').value); if(p) { localStorage.setItem(g, parseInt(localStorage.getItem(g)||0) + p); updateDisplay(g); } }
        function resetScore() { const g = document.getElementById('groupe-select').value; localStorage.setItem(g, 0); updateDisplay(g); }

        function addGlobalFish() { let t = parseInt(localStorage.getItem('globalFish')||0); localStorage.setItem('globalFish', t+1); document.getElementById('global-fish-counter').innerText = t+1; }
        function resetGlobal() { localStorage.setItem('globalFish', 0); document.getElementById('global-fish-counter').innerText = 0; }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('global-fish-counter').innerText = localStorage.getItem('globalFish') || 0;
            for(let i=1; i<=15; i++) document.getElementById('spots-list').innerHTML += `<div class="text-[9px] text-gray-500 border-b border-gray-100 py-1">Emplacement ${i+1}</div>`;
            calculateIndex();
        });
    </script>
</body>
</html>

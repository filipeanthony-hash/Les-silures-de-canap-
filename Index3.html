<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .marine-bg { background: linear-gradient(rgba(12, 26, 38, 0.7), rgba(12, 26, 38, 0.9)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000'); background-size: cover; background-attachment: fixed; }
        .glass-card { background: rgba(25, 59, 87, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(74, 199, 242, 0.3); }
        .input-marine { background: rgba(10, 25, 41, 0.6); border: 1px solid rgba(74, 199, 242, 0.2); }
    </style>
</head>
<body class="marine-bg text-white min-h-full pb-20">

    <div id="login-page" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="glass-card p-8 rounded-2xl w-full max-w-sm text-center">
            <h1 class="text-xl font-bold mb-6">Les Silures de Canapé</h1>
            <input id="username" type="text" placeholder="Pseudo" class="input-marine w-full p-3 mb-3 rounded-xl text-sm">
            <input id="password" type="password" placeholder="Code secret" class="input-marine w-full p-3 mb-6 rounded-xl text-sm">
            <button onclick="tbgDashboard()" class="w-full py-3 bg-blue-500 rounded-xl font-bold">Connexion</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden max-w-md mx-auto p-4 pt-20">
        <div id="tab-carnet" class="dashboard-tab">
            <div class="glass-card p-5 rounded-2xl mb-4">
                <h3 class="font-bold mb-3">Nouvelle Prise</h3>
                <input id="fish-species" type="text" placeholder="Espèce" class="input-marine w-full p-2 mb-2 rounded-lg text-xs">
                <input id="fish-length" type="number" placeholder="Taille (cm)" class="input-marine w-full p-2 mb-3 rounded-lg text-xs">
                <button onclick="saveCatch()" class="w-full py-2 bg-blue-500 rounded-lg text-xs font-bold">Ajouter</button>
            </div>
            <div id="catch-list" class="space-y-2"></div>
        </div>
        
        <div id="tab-meteo" class="dashboard-tab hidden text-center">Météo (GPS activé)</div>
        <div id="tab-noeuds" class="dashboard-tab hidden">Guide Nœuds</div>
        <div id="tab-chat" class="dashboard-tab hidden">Chat Live</div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 w-full glass-card flex justify-around p-4 rounded-t-2xl">
        <button onclick="switchTab('carnet')"><i class="fas fa-book"></i></button>
        <button onclick="switchTab('meteo')"><i class="fas fa-cloud-sun"></i></button>
        <button onclick="switchTab('noeuds')"><i class="fas fa-scroll"></i></button>
        <button onclick="switchTab('chat')"><i class="fas fa-comments"></i></button>
    </nav>

    <script>
        const ADMIN_CODE = "1985";
        let catches = [];

        function tbgDashboard() {
            if (document.getElementById('password').value !== ADMIN_CODE) { alert("Code erroné"); return; }
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
        }

        function switchTab(tab) {
            document.querySelectorAll('.dashboard-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        function saveCatch() {
            const s = document.getElementById('fish-species').value;
            const l = document.getElementById('fish-length').value;
            if(!s || !l) return;
            catches.unshift({s, l});
            renderCatches();
        }

        function renderCatches() {
            document.getElementById('catch-list').innerHTML = catches.map(c => `
                <div class="glass-card p-3 rounded-xl text-xs">${c.s} - ${c.l} cm</div>
            `).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="apple-touch-icon" href="favicon.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans flex flex-col justify-between">

    <div id="login-page" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0d3b66] p-4 overflow-y-auto">
        <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-slate-800 text-center my-8">
            
            <div class="w-24 h-24 bg-gradient-to-tr from-slate-800 to-slate-700 rounded-2xl mx-auto flex items-center justify-center shadow-xl mb-4 overflow-hidden border border-slate-700">
                <img src="favicon.jpg" alt="Les Silures de Canapé" class="w-full h-full object-cover">
            </div>
            
            <h1 class="text-3xl font-black tracking-tight text-white mb-1">Les Silures de Canapé</h1>
            <p class="text-slate-400 text-sm font-medium mb-6">Espace Privé • Carnet de Pêche</p>
            
            <div class="space-y-3 mb-6">
                <button type="button" onclick="loginSuccess()" class="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white text-xs font-bold py-3 rounded-xl flex items-center justify-center space-x-2 transition shadow-lg">
                    <i class="fab fa-facebook-f text-sm"></i>
                    <span>Continuer avec Facebook</span>
                </button>
                <button type="button" onclick="loginSuccess()" class="w-full bg-white hover:bg-slate-100 text-slate-900 text-xs font-bold py-3 rounded-xl flex items-center justify-center space-x-2 transition shadow-lg border border-slate-200">
                    <i class="fab fa-google text-sm text-red-500"></i>
                    <span>Continuer avec Google</span>
                </button>
            </div>

            <div class="relative flex py-2 items-center mb-4">
                <div class="flex-grow border-t border-slate-800"></div>
                <span class="flex-shrink mx-4 text-slate-500 text-[10px] font-bold uppercase tracking-widest">ou par email</span>
                <div class="flex-grow border-t border-slate-800"></div>
            </div>
            
            <form onsubmit="handleAuth(event)" class="text-left space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Adresse Email</label>
                    <input type="email" required placeholder="exemple@silure.com" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00a8e8] focus:ring-1 focus:ring-[#00a8e8] transition">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Mot de passe</label>
                    <input type="password" required placeholder="••••••••" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00a8e8] focus:ring-1 focus:ring-[#00a8e8] transition">
                </div>
                
                <button type="submit" class="w-full bg-[#00a8e8] hover:bg-[#0096d2] text-white font-bold text-xs uppercase tracking-wider py-3.5 rounded-xl shadow-xl transition-all transform active:scale-95 mt-2">
                    Se connecter
                </button>
            </form>
        </div>
    </div>

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800/60 p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-xl overflow-hidden border border-slate-700 bg-slate-800">
                    <img src="favicon.jpg" alt="Logo" class="w-full h-full object-cover">
                </div>
                <span class="text-lg font-black tracking-tight text-white">Les Silures de Canapé</span>
            </div>
            <button onclick="logout()" class="text-[11px] bg-slate-800 hover:bg-red-950 hover:text-red-400 px-3 py-2 rounded-xl font-bold transition-all border border-slate-700/60">
                <i class="fas fa-sign-out-alt mr-1"></i> Déconnexion
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 space-y-6">
        
        <div class="bg-gradient-to-br from-slate-900 to-slate-800/70 p-6 rounded-2xl border border-slate-800 shadow-xl

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Arrière-plan marin texturé haute définition tiré de l'application */
        .marine-bg {
            background-image: linear-gradient(rgba(12, 26, 38, 0.4), rgba(12, 26, 38, 0.4)), 
                              url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Panneau en verre dépoli (Glassmorphism) avec lueur néon bleue */
        .glass-card {
            background: rgba(25, 59, 87, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(74, 199, 242, 0.4);
            box-shadow: 0 0 25px rgba(74, 199, 242, 0.2), inset 0 0 15px rgba(74, 199, 242, 0.1);
        }

        /* Champs de saisie stylisés */
        .input-marine {
            background: rgba(10, 25, 41, 0.7);
            border: 1px solid rgba(74, 199, 242, 0.3);
            transition: all 0.3s ease;
        }
        .input-marine:focus {
            border-color: #4ac7f2;
            box-shadow: 0 0 10px rgba(74, 199, 242, 0.5);
        }
    </style>
</head>
<body class="flex flex-col min-h-full pb-16 antialiased marine-bg text-white">

    <header class="glass-card text-white shadow-lg w-full fixed top-0 z-50 rounded-b-xl border-t-0 border-x-0">
        <div class="max-w-md mx-auto flex items-center justify-between px-5 py-3">
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">
                Les Silures de Canapé
            </h1>
            <a href="https://www.facebook.com/share/g/1Ev1UqzWWy/" target="_blank" class="text-[#4ac7f2] hover:text-white text-2xl transition-all transform hover:scale-110" title="Rejoindre le groupe Facebook">
                <i class="fab fa-facebook"></i>
            </a>
        </div>
    </header>

    <div id="login-page" class="flex flex-col items-center justify-center flex-1 px-6 pt-32 pb-12 w-full max-w-md mx-auto">
        
        <div class="relative w-full px-4 py-8">
            
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 z-20 drop-shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
                <img src="https://img.icons8.com/illustrations/external-fauzidea-flat-fauzidea/180/external-fish-animal-fauzidea-flat-fauzidea.png" alt="Poisson" class="w-28 h-28 object-contain">
            </div>
            
            <div class="absolute -left-6 bottom-4 z-20 animate-pulse drop-shadow-[0_4px_8px_rgba(74,199,242,0.4)]">
                <img src="https://img.icons8.com/fluency/96/anchor.png" alt="Ancre" class="w-16 h-16 object-contain transform -rotate-12">
            </div>

            <div class="w-full p-8 pt-16 space-y-6 glass-card rounded-2xl relative z-10">
                <div class="text-center space-y-1">
                    <p class="text-xs uppercase tracking-wider text-blue-300 font-semibold">Espace Membres</p>
                    <p class="text-sm text-slate-200">Connectez-vous pour activer le Dashboard</p>
                </div>

                <form class="space-y-5" onsubmit="event.preventDefault(); tbgDashboard();">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-300">
                            <i class="fas fa-user text-sm"></i>
                        </span>
                        <input id="username" name="username" type="text" required class="input-marine relative block w-full pl-10 pr-3 py-3 text-white placeholder-blue-300/60 rounded-xl focus:outline-none text-sm" placeholder="Identifiant">
                    </div>

                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-300">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input id="password" name="password" type="password" required class="input-marine relative block w-full pl-10 pr-3 py-3 text-white placeholder-blue-300/60 rounded-xl focus:outline-none text-sm" placeholder="Mot de passe">
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full py-3 px-4 text-sm font-bold text-white bg-gradient-to-r from-blue-500 to-[#4ac7f2] hover:from-blue-600 hover:to-blue-400 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform active:scale-95 cursor-pointer flex items-center justify-center gap-2">
                            <i class="fas fa-sign-in-alt"></i> Se connecter
                        </button>
                    </div>
                </form>
            </div>

            <div class="mt-8 flex justify-center text-blue-400/40">
                <i class="fas fa-map-marker-alt text-3xl animate-bounce"></i>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="hidden flex-col flex-1 w-full max-w-md mx-auto pt-24 px-4">
        <main class="flex-1 space-y-4">
            <div class="p-6 glass-card rounded-2xl shadow-xl border-none">
                <div class="flex items-center gap-3 mb-3 text-[#4ac7f2]">
                    <i class="fas fa-water text-xl"></i>
                    <h3 class="text-lg font-bold text-white">Bienvenue sur votre espace de pêche</h3>
                </div>
                <p class="text-sm text-slate-200 leading-relaxed">
                    Le tableau de bord est déverrouillé avec succès. Vous allez pouvoir y intégrer vos outils favoris : suivi des prises, nœuds de pêche, météo et gestion de vos spots.
                </p>
            </div>
        </main>
    </div>

    <script>
        function tbgDashboard() {
            // Cache la page de login
            document.getElementById('login-page').classList.add('hidden');
            // Affiche le tableau de bord
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('dashboard-page').classList.add('flex');
            // Remonte l'écran automatiquement 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
